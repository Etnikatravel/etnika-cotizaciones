<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNIKA TRAVEL | Cotización</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --violeta:#7700E0;
  --violeta-oscuro:#4d0099;
  --turquesa:#00E5BF;
  --gris:#F2F2F2;
  --gris-suave:#f7f7fb;
  --oscuro:#171717;
  --texto:#2a2a2a;
  --borde:#e9e9ef;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{
  background:
    radial-gradient(circle at top left, rgba(0,229,191,.18), transparent 34%),
    radial-gradient(circle at top right, rgba(119,0,224,.18), transparent 30%),
    var(--gris-suave);
  color:var(--texto);
}
.container{max-width:1100px;margin:32px auto;padding:0 20px}
.preview{
  background:white;
  border-radius:28px;
  padding:0;
  overflow:hidden;
  box-shadow:0 18px 48px rgba(32,18,54,.13);
}
.preview-logo{
  text-align:center;
  padding:10px 20px 8px;
  background:white;
  border-bottom:1px solid var(--borde);
}
.preview-logo img{
  max-width:210px;
  width:100%;
  height:auto;
}
h2{
  color:var(--violeta);
  margin-bottom:18px;
  font-size:28px;
  letter-spacing:-.3px;
}
.preview > h2{padding:26px 30px 0}
.preview-section{
  border-left:6px solid var(--turquesa);
  background:#fbfbff;
  border-radius:18px;
  padding:20px;
  margin:18px 30px;
  border-top:1px solid #f0eff5;
  border-right:1px solid #f0eff5;
  border-bottom:1px solid #f0eff5;
}
.preview-section h3{color:var(--violeta);margin-bottom:10px;font-size:21px}
.hotel-card{
  border:1px solid #eceaf2;
  border-radius:20px;
  padding:20px;
  margin:18px 30px;
  background:white;
  box-shadow:0 8px 22px rgba(0,0,0,.06);
}
.hotel-card h3{color:var(--violeta);font-size:22px;margin-bottom:8px}
.badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--turquesa),#b7fff0);
  color:#06352d;
  border-radius:999px;
  padding:5px 12px;
  font-weight:800;
  font-size:12px;
  margin:4px 5px 10px 0;
}
.price-big{font-size:34px;font-weight:900;color:var(--violeta);margin-top:10px}
.preview-img{max-width:100%;border-radius:16px;margin-top:14px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.btn{
  border:none;
  padding:14px 22px;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.btn-whatsapp{background:var(--turquesa);color:#061b16}
a{color:var(--violeta);font-weight:bold}
@media(max-width:700px){
  .container{margin:18px auto;padding:0 12px}
  .preview{border-radius:22px}
  .preview > h2{padding:22px 16px 0;font-size:24px}
  .preview-section,.hotel-card{margin:16px;padding:18px}
  .preview-logo img{
  max-width:210px;
  width:100%;
  height:auto;
}
}

/* AJUSTES ETNIKA - CABECERA Y DATOS */
.preview-logo{
  text-align:center;
  padding:10px 20px 8px;
  background:white;
  border-bottom:1px solid var(--borde);
}

.preview-logo img{
  max-width:210px;
  width:100%;
  height:auto;
}

.destino-header{
  text-align:center;
  padding:22px 30px 20px;
}

.destino-header h1{
  color:var(--violeta);
  font-size:48px;
  line-height:1.05;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:-.5px;
  margin-bottom:12px;
}

.fecha-viaje-destino{
  color:#5f5f6b;
  font-size:24px;
  font-weight:800;
  text-transform:uppercase;
}

.origen-destino{
  color:#777;
  font-size:16px;
  font-weight:700;
  margin-top:6px;
  text-transform:uppercase;
}

.info-grid-etnika{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  background:white;
  border-radius:18px;
  margin:18px 30px 26px;
  overflow:hidden;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
  border:1px solid #eceaf2;
  border-top:5px solid transparent;
  position:relative;
}

.info-grid-etnika:before{
  content:"";
  position:absolute;
  left:0;
  
  width:100%;
  height:5px;
  background:linear-gradient(90deg,var(--turquesa),var(--violeta));
}

.info-card-etnika{
  text-align:center;
  padding:25px 14px 22px;
  border-right:1px solid #eceaf2;
}

.info-card-etnika:last-child{
  border-right:none;
}

.info-icon-etnika{
  font-size:28px;
  margin-bottom:10px;
  color:var(--violeta);
}

.info-label-etnika{
  font-size:14px;
  color:#666;
  margin-bottom:8px;
}

.info-value-etnika{
  font-size:18px;
  font-weight:900;
  color:#222;
  text-transform:uppercase;
  line-height:1.25;
}

/* AJUSTES ETNIKA - HOTELES */
.hotel-main-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:22px;
  align-items:center;
}

.hotel-info-left{
  min-width:0;
}

.hotel-info-left h3{
  color:#222;
  font-size:24px;
  font-weight:900;
  text-transform:uppercase;
  margin-bottom:8px;
}

.hotel-precio-right{
  text-align:right;
  min-width:190px;
  padding-left:22px;
  border-left:1px solid #eceaf2;
}

.hotel-precio-valor{
  color:var(--violeta);
  font-size:34px;
  font-weight:900;
  line-height:1;
  white-space:nowrap;
}

.hotel-precio-label{
  color:#666672;
  font-size:13px;
  font-weight:800;
  margin-top:9px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.hotel-card p{
  font-size:17px;
  line-height:1.45;
}

@media(max-width:800px){
  .info-grid-etnika{
    grid-template-columns:1fr 1fr;
    margin:16px;
  }

  .info-card-etnika{
    border-right:none;
    border-bottom:1px solid #eceaf2;
  }

  .destino-header h1{
    font-size:38px;
  }

  .fecha-viaje-destino{
    font-size:20px;
  }

  .hotel-main-row{
    grid-template-columns:1fr;
  }

  .hotel-precio-right{
    text-align:left;
    min-width:0;
    border-left:none;
    padding-left:0;
    margin-top:12px;
  }

  .hotel-precio-valor{
    font-size:30px;
  }
}

@media(max-width:520px){
  .preview-logo{
    padding:14px 16px 10px !important;
  }

  .preview-logo img{
  max-width:210px;
  width:100%;
  height:auto;
}

  .info-grid-etnika{
    grid-template-columns:1fr;
  }

  .destino-header{
    padding:18px 16px 16px;
  }

  .destino-header h1{
    font-size:32px;
  }
}

</style>
</head>

<body>
<div class="container">
  <section class="preview" id="cotizacion">
    <h2>Cargando cotización...</h2>
  </section>
</div>

<script>
const SUPABASE_URL = "https://izuvvwnqczvmphuvjzyf.supabase.co";
const SUPABASE_KEY = "sb_publishable_r8syG_LzXy7NUymta20UFA_kPjGw_HN";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeLineas(texto){ return texto ? texto.replace(/\n/g,"<br>") : ""; }

function renderCotizacion(data){
  let contenido = "";

  if(data.modo === "simple"){
    contenido += `
      <h2>Vuelos</h2>
      <div class="preview-section">
        ${data.simple?.vueloIda ? `<p><strong>Ida:</strong><br>${escapeLineas(data.simple.vueloIda)}</p>` : ""}
        ${data.simple?.vueloVuelta ? `<p><strong>Vuelta:</strong><br>${escapeLineas(data.simple.vueloVuelta)}</p>` : ""}
        ${data.simple?.equipaje ? `<p><strong>Equipaje incluido:</strong> ${data.simple.equipaje}</p>` : ""}
        ${data.simple?.capturaVuelo ? `<img src="${data.simple.capturaVuelo}" class="preview-img">` : ""}
      </div>
    `;

    if(data.simple?.incluye){
      contenido += `<h2>Incluye</h2><div class="preview-section">${data.simple.incluye.split("\n").map(x=>x.trim()?`<p>✓ ${x}</p>`:"").join("")}</div>`;
    }
let hotelesHtml = "";
    (data.hoteles || []).forEach(h=>{
      hotelesHtml += `
        <div class="hotel-card">
          <div class="hotel-main-row">
            <div class="hotel-info-left">
              <h3>${h.nombre || "Hotel"}</h3>
              ${h.etiqueta ? `<span class="badge">${h.etiqueta}</span>` : ""}
              ${h.estado ? `<span class="badge">${h.estado}</span>` : ""}
              ${h.categoria ? `<p><strong>Categoría:</strong> ${h.categoria}</p>` : ""}
              ${h.habitacion ? `<p>${h.habitacion}</p>` : ""}
              ${h.regimen ? `<p>${h.regimen}</p>` : ""}
              ${h.link ? `<p><a href="${h.link}" target="_blank">Ver hotel en Google</a></p>` : ""}
            </div>

            ${h.precio ? `
              <div class="hotel-precio-right">
                <div class="hotel-precio-valor">${h.precio}</div>
                <div class="hotel-precio-label">POR PERSONA</div>
              </div>
            ` : ""}
          </div>
        </div>
      `;
    });
    contenido += `<h2>Opciones de alojamiento</h2>${hotelesHtml || "<p>No se agregaron hoteles.</p>"}`;
  } else {
    let tramosHtml = "";
    (data.tramos || []).forEach(t=>{
      tramosHtml += `
        <div class="preview-section">
          <h3>${t.tipo}: ${t.titulo}</h3>
          ${t.fechas ? `<p><strong>Fechas:</strong> ${t.fechas}</p>` : ""}
          ${t.duracion ? `<p><strong>Duración / noches:</strong> ${t.duracion}</p>` : ""}
          ${t.detalle ? `<p><strong>Detalle:</strong><br>${escapeLineas(t.detalle)}</p>` : ""}
          ${t.regimen ? `<p><strong>Incluye / empresa:</strong> ${t.regimen}</p>` : ""}
          ${t.precio ? `<p><strong>Precio:</strong> ${t.precio}</p>` : ""}
          ${t.estado ? `<p><span class="badge">${t.estado}</span></p>` : ""}
          ${t.link ? `<p><a href="${t.link}" target="_blank">Ver link / ubicación</a></p>` : ""}
          ${t.imagen ? `<img src="${t.imagen}" class="preview-img">` : ""}
        </div>
      `;
    });
    contenido += `<h2>Itinerario y servicios</h2>${tramosHtml || "<p>No se agregaron tramos.</p>"}`;
  }

  return `
    <div class="preview-logo"><img src="DEGRADADO CON LEGAJO.png" alt="ETNIKA TRAVEL"></div>

    <div class="destino-header">
      <h1>${data.destino || "Cotización de viaje"}</h1>
      ${data.fechaViaje ? `<div class="fecha-viaje-destino">📅 ${data.fechaViaje}</div>` : ""}
    </div>

    <div class="info-grid-etnika">
      ${data.cliente ? `<div class="info-card-etnika"><div class="info-icon-etnika">👤</div><div class="info-label-etnika">Cliente</div><div class="info-value-etnika">${data.cliente}</div></div>` : ""}
      ${data.pasajeros ? `<div class="info-card-etnika"><div class="info-icon-etnika">👥</div><div class="info-label-etnika">Pasajeros</div><div class="info-value-etnika">${data.pasajeros}</div></div>` : ""}
      ${data.fechaCotizacion ? `<div class="info-card-etnika"><div class="info-icon-etnika">📅</div><div class="info-label-etnika">Fecha de cotización</div><div class="info-value-etnika">${data.fechaCotizacion}</div></div>` : ""}
      ${data.codigo ? `<div class="info-card-etnika"><div class="info-icon-etnika">🏷️</div><div class="info-label-etnika">Cotización</div><div class="info-value-etnika">${data.codigo}</div></div>` : ""}
      ${data.vendedora ? `<div class="info-card-etnika"><div class="info-icon-etnika">👩</div><div class="info-label-etnika">Asesora</div><div class="info-value-etnika">${data.vendedora}</div></div>` : ""}
    </div>
    ${contenido}
    <div class="preview-section"><h3>Forma de pago</h3><p>${escapeLineas(data.formaPago || "")}</p></div>
    <div class="preview-section">
      <h3>Condiciones importantes</h3>
      <p>${escapeLineas(data.observaciones || "")}</p>
      <p>La contratación implica la aceptación de las <a href="https://etnikatravel.tur.ar/general-conditions" target="_blank">Condiciones Generales de ETNIKA TRAVEL</a>.</p>
    </div>
    <div class="preview-section" style="text-align:center;">
      <h3>ETNIKA TRAVEL S.R.L.</h3>
      <p>Legajo EVT Nº 18418 | CUIT 30-71775467-7</p>
      <p><a href="https://maps.app.goo.gl/QGwE9kNAV4aiuszz9" target="_blank">📍 Ver oficina en Google Maps</a></p>
      <p>🕒 Lunes a Viernes de 10:00 a 18:00 hs</p>
      <p><a href="https://etnikatravel.tur.ar" target="_blank">🌐 etnikatravel.tur.ar</a></p>
      ${data.whatsapp ? `<p><a class="btn btn-whatsapp" href="https://wa.me/${data.whatsapp}" target="_blank">📲 Contactar por WhatsApp</a></p>` : ""}
    </div>
    ${data.validez ? `<div class="validez-final-etnika" style="text-align:center;color:#888;font-size:12px;margin:18px 30px 26px;">Validez de la cotización: ${data.validez}</div>` : ""}
  `;
}

async function cargar(){
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("id");

  if(!codigo){
    document.getElementById("cotizacion").innerHTML = "<h2>No se indicó una cotización.</h2>";
    return;
  }

  const { data, error } = await supabaseClient
    .from("cotizaciones")
    .select("*")
    .eq("codigo", codigo)
    .single();

  if(error || !data){
    document.getElementById("cotizacion").innerHTML = "<h2>No encontramos esta cotización.</h2>";
    console.error(error);
    return;
  }

  const datos = JSON.parse(data.datos_json);
  document.getElementById("cotizacion").innerHTML = renderCotizacion(datos);
}

cargar();
</script>

</body>
</html>
