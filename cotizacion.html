<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNIKA TRAVEL | Cotización</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --violeta:#7700E0;
  --violeta-oscuro:#4d0099;
  --turquesa:#00E5BF;
  --gris:#F7F7FB;
  --oscuro:#171717;
  --texto:#3d3d45;
  --borde:#eceaf2;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#fff;
  color:var(--texto);
}

.page{
  max-width:1180px;
  margin:0 auto;
  background:white;
}

.brand-hero{
  min-height:250px;
  background:
    linear-gradient(to bottom, rgba(255,255,255,.18), rgba(255,255,255,.95)),
    url("header-etnika-dibujos.png");
  background-repeat:no-repeat;
  background-size:cover;
  background-position:top center;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:34px;
  border-bottom:3px solid transparent;
  border-image:linear-gradient(90deg,var(--turquesa),var(--violeta)) 1;
}

.brand-hero img{
  max-width:330px;
  width:48%;
  min-width:230px;
  height:auto;
  filter:drop-shadow(0 8px 18px rgba(0,0,0,.08));
}

.slogan{
  text-align:center;
  color:var(--violeta);
  font-weight:900;
  letter-spacing:.8px;
  font-size:21px;
  margin-top:-70px;
  margin-bottom:70px;
}

.slogan:after{
  content:"";
  display:block;
  width:120px;
  height:4px;
  border-radius:20px;
  margin:12px auto 0;
  background:linear-gradient(90deg,var(--turquesa),var(--violeta));
}

.title-block{
  text-align:center;
  padding:0 24px 24px;
}

.title-block h1{
  color:var(--violeta);
  font-size:76px;
  line-height:.95;
  letter-spacing:-2px;
  font-weight:900;
  text-transform:uppercase;
}

.title-block .subtitle{
  margin-top:18px;
  color:#666672;
  font-size:30px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:1px;
}

.container{
  max-width:1080px;
  margin:0 auto;
  padding:0 24px 42px;
}

.summary-card{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  background:white;
  border:1px solid var(--borde);
  border-radius:20px;
  box-shadow:0 12px 34px rgba(32,18,54,.10);
  overflow:hidden;
  margin:16px 0 28px;
}

.summary-item{
  padding:24px 18px;
  text-align:center;
  border-right:1px solid var(--borde);
}

.summary-item:last-child{
  border-right:none;
}

.summary-icon{
  font-size:34px;
  margin-bottom:10px;
}

.summary-label{
  font-size:14px;
  color:#666672;
  font-weight:800;
  margin-bottom:8px;
}

.summary-value{
  font-size:17px;
  color:#202025;
  font-weight:800;
  line-height:1.35;
}

.summary-value.codigo{
  color:var(--violeta);
  font-size:20px;
}

.price-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:30px;
}

.price-card{
  background:linear-gradient(135deg,var(--violeta),var(--violeta-oscuro));
  color:white;
  border-radius:20px;
  padding:28px;
  display:flex;
  align-items:center;
  gap:24px;
  min-height:150px;
  box-shadow:0 12px 34px rgba(119,0,224,.22);
}

.price-icon{
  font-size:54px;
}

.price-label{
  font-size:18px;
  font-weight:800;
}

.price-value{
  font-size:46px;
  font-weight:900;
  line-height:1;
  margin-top:6px;
}

.price-note{
  font-size:18px;
  font-weight:800;
  margin-top:10px;
}

.notice-card{
  background:linear-gradient(135deg,#fbf8ff,#ffffff);
  border:1px solid var(--borde);
  border-radius:20px;
  padding:28px;
  display:flex;
  align-items:center;
  gap:22px;
  min-height:150px;
  box-shadow:0 8px 22px rgba(0,0,0,.05);
}

.notice-icon{
  font-size:48px;
  color:var(--violeta);
}

.notice-card h3{
  color:#666672;
  margin-bottom:8px;
}

.notice-card p{
  font-size:16px;
  line-height:1.5;
}

.section{
  background:white;
  border:1px solid var(--borde);
  border-radius:20px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:0 8px 22px rgba(0,0,0,.05);
}

.section h2{
  color:var(--violeta);
  font-size:28px;
  margin-bottom:18px;
}

.section h3{
  color:var(--violeta);
  margin-bottom:12px;
}

.flight-box{
  background:#fbfbff;
  border-left:5px solid var(--turquesa);
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
}

.check-list p{
  margin:8px 0;
  line-height:1.4;
}

.hotel-card{
  border:1px solid #eceaf2;
  border-radius:18px;
  padding:20px;
  margin-bottom:14px;
  background:#fff;
  box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.hotel-card h3{
  color:var(--violeta);
  font-size:23px;
}

.badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--turquesa),#b7fff0);
  color:#06352d;
  border-radius:999px;
  padding:5px 12px;
  font-weight:900;
  font-size:12px;
  margin:6px 5px 10px 0;
}

.preview-img{
  max-width:100%;
  border-radius:16px;
  margin-top:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.contact-strip{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  background:white;
  border:1px solid var(--borde);
  border-radius:20px;
  box-shadow:0 12px 34px rgba(32,18,54,.10);
  overflow:hidden;
  margin:34px 0 24px;
}

.contact-item{
  padding:22px 14px;
  text-align:center;
  border-right:1px solid var(--borde);
  font-size:14px;
  line-height:1.4;
}

.contact-item:last-child{
  border-right:none;
}

.contact-icon{
  font-size:30px;
  margin-bottom:8px;
}

.bottom-slogan{
  text-align:center;
  color:var(--violeta);
  font-size:25px;
  font-style:italic;
  margin:20px 0;
}

.legal{
  text-align:center;
  color:#666672;
  font-size:13px;
  line-height:1.5;
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid var(--borde);
}

.validez-small{
  font-size:12px;
  color:#777;
  text-align:center;
  margin-top:10px;
}

a{
  color:var(--violeta);
  font-weight:800;
}

.btn{
  border:none;
  padding:13px 20px;
  border-radius:999px;
  font-weight:800;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  justify-content:center;
  align-items:center;
}

.btn-whatsapp{
  background:var(--turquesa);
  color:#061b16;
}

@media(max-width:850px){
  .brand-hero{min-height:200px;}
  .slogan{margin-top:-45px;margin-bottom:45px;font-size:17px;}
  .title-block h1{font-size:46px;}
  .title-block .subtitle{font-size:22px;}
  .summary-card,.contact-strip{grid-template-columns:1fr 1fr;}
  .summary-item,.contact-item{border-right:none;border-bottom:1px solid var(--borde);}
  .price-row{grid-template-columns:1fr;}
  .price-value{font-size:36px;}
}

@media(max-width:520px){
  .container{padding:0 14px 30px;}
  .brand-hero{min-height:170px;background-size:cover;}
  .brand-hero img{min-width:210px;}
  .slogan{font-size:15px;margin-top:-35px;margin-bottom:35px;}
  .title-block h1{font-size:38px;}
  .title-block .subtitle{font-size:18px;}
  .summary-card,.contact-strip{grid-template-columns:1fr;}
  .summary-item,.contact-item{border-bottom:1px solid var(--borde);}
  .price-card,.notice-card{flex-direction:column;text-align:center;}
}
</style>
</head>

<body>
<div class="page">
  <section id="cotizacion">
    <h2 style="padding:30px;text-align:center;color:#7700E0;">Cargando cotización...</h2>
  </section>
</div>

<script>
const SUPABASE_URL = "https://izuvvwnqczvmphuvjzyf.supabase.co";
const SUPABASE_KEY = "sb_publishable_r8syG_LzXy7NUymta20UFA_kPjGw_HN";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeLineas(texto){
  return texto ? texto.replace(/\n/g,"<br>") : "";
}

function formatoDestino(destino){
  return (destino || "Cotización de viaje").toUpperCase();
}

function subtituloViaje(data){
  const fecha = data.fechaViaje || "";
  if(!fecha) return "";
  return fecha.toUpperCase();
}

function limpiarPrecio(precio){
  if(!precio) return "";
  return precio.replace(/grupo familiar/ig,"").trim();
}

function notaPrecio(precio){
  if(!precio) return "";
  return precio.toLowerCase().includes("grupo familiar") ? "Grupo familiar" : "";
}

function renderCotizacion(data){
  let contenido = "";

  if(data.modo === "simple"){
    contenido += `
      <section class="section">
        <h2>Vuelos</h2>
        ${data.simple?.vueloIda ? `<div class="flight-box"><strong>Ida:</strong><br>${escapeLineas(data.simple.vueloIda)}</div>` : ""}
        ${data.simple?.vueloVuelta ? `<div class="flight-box"><strong>Vuelta:</strong><br>${escapeLineas(data.simple.vueloVuelta)}</div>` : ""}
        ${data.simple?.equipaje ? `<p><strong>Equipaje incluido:</strong> ${data.simple.equipaje}</p>` : ""}
        ${data.simple?.capturaVuelo ? `<img src="${data.simple.capturaVuelo}" class="preview-img">` : ""}
      </section>
    `;

    if(data.simple?.incluye){
      contenido += `<section class="section check-list"><h2>Incluye</h2>${data.simple.incluye.split("\n").map(x=>x.trim()?`<p>✓ ${x}</p>`:"").join("")}</section>`;
    }

    if(data.simple?.noIncluye){
      contenido += `<section class="section check-list"><h2>No incluye</h2>${data.simple.noIncluye.split("\n").map(x=>x.trim()?`<p>✗ ${x}</p>`:"").join("")}</section>`;
    }

    let hotelesHtml = "";
    (data.hoteles || []).forEach(h=>{
      hotelesHtml += `
        <div class="hotel-card">
          <h3>${h.nombre || "Hotel"}</h3>
          ${h.etiqueta ? `<span class="badge">${h.etiqueta}</span>` : ""}
          ${h.estado ? `<span class="badge">${h.estado}</span>` : ""}
          ${h.categoria ? `<p><strong>Categoría:</strong> ${h.categoria}</p>` : ""}
          ${h.habitacion ? `<p><strong>Habitación:</strong> ${h.habitacion}</p>` : ""}
          ${h.regimen ? `<p><strong>Régimen:</strong> ${h.regimen}</p>` : ""}
          ${h.precio ? `<p><strong>Precio:</strong> ${h.precio}</p>` : ""}
          ${h.link ? `<p><a href="${h.link}" target="_blank">Ver hotel en Google</a></p>` : ""}
        </div>
      `;
    });

    contenido += `<section class="section"><h2>Opciones de alojamiento</h2>${hotelesHtml || "<p>No se agregaron hoteles.</p>"}</section>`;
  } else {
    let tramosHtml = "";
    (data.tramos || []).forEach(t=>{
      tramosHtml += `
        <div class="hotel-card">
          <h3>${t.tipo}: ${t.titulo}</h3>
          ${t.fechas ? `<p><strong>Fechas:</strong> ${t.fechas}</p>` : ""}
          ${t.duracion ? `<p><strong>Duración / noches:</strong> ${t.duracion}</p>` : ""}
          ${t.detalle ? `<p><strong>Detalle:</strong><br>${escapeLineas(t.detalle)}</p>` : ""}
          ${t.regimen ? `<p><strong>Incluye / empresa:</strong> ${t.regimen}</p>` : ""}
          ${t.precio ? `<p><strong>Precio:</strong> ${t.precio}</p>` : ""}
          ${t.estado ? `<p><span class="badge">${t.estado}</span></p>` : ""}
          ${t.link ? `<p><a href="${t.link}" target="_blank">Ver link / ubicación</a></p>` : ""}
          ${t.imagen ? `<img src="${t.imagen}" class="preview-img">` : ""}
        </div>
      `;
    });

    contenido += `<section class="section"><h2>Itinerario y servicios</h2>${tramosHtml || "<p>No se agregaron tramos.</p>"}</section>`;
  }

  const precioLimpio = limpiarPrecio(data.precioTotal || "");
  const nota = notaPrecio(data.precioTotal || "");

  return `
    <header class="brand-hero">
      <img src="DEGRADADO CON LEGAJO.png" alt="ETNIKA TRAVEL">
    </header>

    <div class="slogan">LA NUEVA EXPERIENCIA DE VIAJAR</div>

    <section class="title-block">
      <h1>${formatoDestino(data.destino)}</h1>
      <div class="subtitle">${subtituloViaje(data)}</div>
    </section>

    <main class="container">
      <section class="summary-card">
        <div class="summary-item">
          <div class="summary-icon">♡</div>
          <div class="summary-label">Cliente</div>
          <div class="summary-value">${data.cliente || "-"}</div>
        </div>

        <div class="summary-item">
          <div class="summary-icon">☑</div>
          <div class="summary-label">Fecha de viaje</div>
          <div class="summary-value">${data.fechaViaje || "-"}</div>
        </div>

        <div class="summary-item">
          <div class="summary-icon">☑</div>
          <div class="summary-label">Fecha de cotización</div>
          <div class="summary-value">${data.fechaCotizacion || "-"}</div>
        </div>

        <div class="summary-item">
          <div class="summary-icon">♙</div>
          <div class="summary-label">Asesora</div>
          <div class="summary-value">${data.vendedora || "-"}</div>
        </div>

        <div class="summary-item">
          <div class="summary-icon">◇</div>
          <div class="summary-label">Cotización N°</div>
          <div class="summary-value codigo">${data.codigo || "-"}</div>
        </div>
      </section>

      ${precioLimpio ? `
      <section class="price-row">
        <div class="price-card">
          <div class="price-icon">♚</div>
          <div>
            <div class="price-label">Precio total</div>
            <div class="price-value">${precioLimpio}</div>
            ${nota ? `<div class="price-note">${nota}</div>` : ""}
          </div>
        </div>

        <div class="notice-card">
          <div class="notice-icon">◷</div>
          <div>
            <h3>Información importante</h3>
            <p>Sujeto a disponibilidad y cambios sin previo aviso.</p>
          </div>
        </div>
      </section>
      ` : ""}

      ${contenido}

      <section class="section">
        <h2>Forma de pago</h2>
        <p>${escapeLineas(data.formaPago || "")}</p>
      </section>

      <section class="section">
        <h2>Condiciones importantes</h2>
        <p>${escapeLineas(data.observaciones || "")}</p>
        <p>La contratación implica la aceptación de las <a href="https://etnikatravel.tur.ar/general-conditions" target="_blank">Condiciones Generales de ETNIKA TRAVEL</a>.</p>
      </section>

      <section class="contact-strip">
        <div class="contact-item">
          <div class="contact-icon">◎</div>
          <strong>etnikatravel.tur.ar</strong>
        </div>
        <div class="contact-item">
          <div class="contact-icon">⌖</div>
          <strong>Legajo EVT Nº 18418</strong><br>CUIT 30-71775467-7
        </div>
        <div class="contact-item">
          <div class="contact-icon">◷</div>
          <strong>Lunes a Viernes</strong><br>10:00 a 18:00 hs
        </div>
        <div class="contact-item">
          <div class="contact-icon">☏</div>
          <strong>WhatsApp</strong><br>+54 9 341 217 7311
        </div>
        <div class="contact-item">
          <div class="contact-icon">▣</div>
          <strong>@etnikatravel</strong><br>Seguinos en Instagram
        </div>
      </section>

      <div class="bottom-slogan">Viajamos con vos, creamos experiencias inolvidables.</div>

      <div class="legal">
        <p>Tarifas sujetas a modificación sin previo aviso y según disponibilidad al momento de la reserva.</p>
        <p>Pagos en dólar billete; no se aceptan billetes escritos ni manchados.</p>
        <p>Términos y condiciones generales disponibles en nuestra web WWW.ETNIKATRAVEL.TUR.AR</p>
        <p><strong>ETNIKA TRAVEL Agencia de Viajes</strong> - Leg Nº 18418 - Rodríguez 1179, Rosario, Sta Fe / TEL: 3412177311 / MAIL: info@etnikatravel.tur.ar</p>
        ${data.validez ? `<p class="validez-small">Validez de la cotización: ${data.validez}</p>` : ""}
      </div>
    </main>
  `;
}

async function cargar(){
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("id");

  if(!codigo){
    document.getElementById("cotizacion").innerHTML = "<h2 style='padding:30px;text-align:center;color:#7700E0;'>No se indicó una cotización.</h2>";
    return;
  }

  const { data, error } = await supabaseClient
    .from("cotizaciones")
    .select("*")
    .eq("codigo", codigo)
    .single();

  if(error || !data){
    document.getElementById("cotizacion").innerHTML = "<h2 style='padding:30px;text-align:center;color:#7700E0;'>No encontramos esta cotización.</h2>";
    console.error(error);
    return;
  }

  const datos = JSON.parse(data.datos_json);
  document.getElementById("cotizacion").innerHTML = renderCotizacion(datos);
}

cargar();
</script>

</body>
</html>
