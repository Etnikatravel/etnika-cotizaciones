<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNIKA TRAVEL | Cotización</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --violeta:#7700E0;
  --violeta-oscuro:#4c0099;
  --turquesa:#00E5BF;
  --gris:#F6F6FA;
  --texto:#2c2c35;
  --muted:#6f6f7a;
  --borde:#eceaf2;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:
    radial-gradient(circle at top left, rgba(0,229,191,.11), transparent 30%),
    radial-gradient(circle at top right, rgba(119,0,224,.10), transparent 30%),
    var(--gris);
  color:var(--texto);
}

.header-etnika{
  background:white;
  text-align:center;
  padding:26px 16px 20px;
  border-bottom:1px solid var(--borde);
}

.header-etnika img{
  max-width:220px;
  width:45%;
  min-width:160px;
  height:auto;
}

.container{
  max-width:1080px;
  margin:28px auto 44px;
  padding:0 18px;
}

.hero-destino{
  text-align:center;
  margin:20px auto 28px;
}

.hero-destino h1{
  color:var(--violeta);
  font-size:56px;
  line-height:1;
  letter-spacing:-1px;
  text-transform:uppercase;
  font-weight:900;
}

.hero-destino .fecha{
  margin-top:12px;
  font-size:24px;
  color:#5f5f6b;
  font-weight:800;
}

.hero-destino .desde{
  margin-top:6px;
  font-size:17px;
  color:var(--muted);
}

.card{
  background:white;
  border:1px solid var(--borde);
  border-radius:22px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:0 12px 30px rgba(33,19,57,.07);
}

.info-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:0;
  padding:0;
  overflow:hidden;
}

.info-item{
  padding:20px 14px;
  text-align:center;
  border-right:1px solid var(--borde);
}

.info-item:last-child{
  border-right:none;
}

.info-icon{
  font-size:26px;
  margin-bottom:8px;
}

.info-label{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  margin-bottom:6px;
}

.info-value{
  font-weight:800;
  font-size:16px;
  line-height:1.35;
}

.info-value.codigo{
  color:var(--violeta);
}

.price-card{
  background:linear-gradient(135deg,var(--violeta),var(--violeta-oscuro));
  color:white;
  border-radius:22px;
  padding:28px;
  margin-bottom:22px;
  box-shadow:0 14px 34px rgba(119,0,224,.22);
}

.price-label{
  font-weight:800;
  font-size:17px;
  opacity:.9;
}

.price-value{
  margin-top:8px;
  font-weight:900;
  font-size:42px;
  line-height:1;
}

.price-note{
  margin-top:9px;
  font-weight:800;
  font-size:17px;
}

h2{
  color:var(--violeta);
  font-size:26px;
  margin-bottom:16px;
}

h3{
  color:var(--violeta);
  margin-bottom:8px;
}

.section{
  background:white;
  border:1px solid var(--borde);
  border-radius:22px;
  padding:24px;
  margin-bottom:22px;
  box-shadow:0 10px 26px rgba(33,19,57,.06);
}

.flight-box{
  background:#fbfbff;
  border-left:5px solid var(--turquesa);
  border-radius:16px;
  padding:17px;
  margin-bottom:14px;
  line-height:1.5;
}

.check-list p{
  margin:8px 0;
  line-height:1.45;
}

.hotel-card{
  border:1px solid var(--borde);
  border-radius:18px;
  padding:20px;
  margin-bottom:14px;
  background:#fff;
  box-shadow:0 6px 18px rgba(0,0,0,.045);
}

.hotel-card h3{
  font-size:21px;
}

.badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--turquesa),#cffff7);
  color:#073d34;
  border-radius:999px;
  padding:5px 12px;
  font-weight:900;
  font-size:12px;
  margin:5px 5px 10px 0;
}

.preview-img{
  max-width:100%;
  border-radius:16px;
  margin-top:14px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.footer-card{
  background:white;
  border:1px solid var(--borde);
  border-radius:22px;
  padding:20px;
  margin-top:26px;
  box-shadow:0 10px 26px rgba(33,19,57,.06);
}

.footer-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  text-align:center;
}

.footer-item{
  font-size:14px;
  line-height:1.4;
  color:#34343b;
}

.footer-icon{
  font-size:24px;
  margin-bottom:6px;
}

.eslogan{
  text-align:center;
  color:var(--violeta);
  font-size:20px;
  font-weight:700;
  font-style:italic;
  margin:24px 0 12px;
}

.legal{
  text-align:center;
  color:#777;
  font-size:12px;
  line-height:1.5;
  max-width:900px;
  margin:12px auto 0;
}

.validez-small{
  margin-top:10px;
  color:#888;
  font-size:11px;
}

a{
  color:var(--violeta);
  font-weight:800;
}

.btn{
  border:none;
  padding:13px 20px;
  border-radius:999px;
  font-weight:800;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  justify-content:center;
  align-items:center;
}

.btn-whatsapp{
  background:var(--turquesa);
  color:#061b16;
}

@media(max-width:900px){
  .info-grid{
    grid-template-columns:1fr 1fr;
  }

  .info-item{
    border-right:none;
    border-bottom:1px solid var(--borde);
  }

  .footer-grid{
    grid-template-columns:1fr 1fr;
  }

  .hero-destino h1{
    font-size:42px;
  }
}

@media(max-width:560px){
  .container{
    margin-top:18px;
    padding:0 12px;
  }

  .header-etnika{
    padding:20px 14px 16px;
  }

  .header-etnika img{
    max-width:180px;
  }

  .hero-destino h1{
    font-size:34px;
  }

  .hero-destino .fecha{
    font-size:19px;
  }

  .info-grid,
  .footer-grid{
    grid-template-columns:1fr;
  }

  .price-value{
    font-size:34px;
  }

  .card,.section,.footer-card{
    border-radius:18px;
    padding:18px;
  }
}
</style>
</head>

<body>
<section id="cotizacion">
  <div class="header-etnika">
    <img src="DEGRADADO CON LEGAJO.png" alt="ETNIKA TRAVEL">
  </div>
  <div class="container">
    <div class="section">
      <h2>Cargando cotización...</h2>
    </div>
  </div>
</section>

<script>
const SUPABASE_URL = "https://izuvvwnqczvmphuvjzyf.supabase.co";
const SUPABASE_KEY = "sb_publishable_r8syG_LzXy7NUymta20UFA_kPjGw_HN";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeLineas(texto){
  return texto ? texto.replace(/\n/g,"<br>") : "";
}

function destinoTitulo(data){
  return (data.destino || "Cotización de viaje").toUpperCase();
}

function fechaSubtitulo(data){
  return data.fechaViaje || "";
}

function precioPrincipal(precio){
  if(!precio) return "";
  return precio.replace(/grupo familiar/ig,"").trim();
}

function notaPrecio(precio){
  if(!precio) return "";
  return precio.toLowerCase().includes("grupo familiar") ? "Grupo familiar" : "";
}

function renderCotizacion(data){
  let contenido = "";

  if(data.modo === "simple"){
    contenido += `
      <section class="section">
        <h2>Vuelos</h2>
        ${data.simple?.vueloIda ? `<div class="flight-box"><strong>Ida:</strong><br>${escapeLineas(data.simple.vueloIda)}</div>` : ""}
        ${data.simple?.vueloVuelta ? `<div class="flight-box"><strong>Vuelta:</strong><br>${escapeLineas(data.simple.vueloVuelta)}</div>` : ""}
        ${data.simple?.equipaje ? `<p><strong>Equipaje incluido:</strong> ${data.simple.equipaje}</p>` : ""}
        ${data.simple?.capturaVuelo ? `<img src="${data.simple.capturaVuelo}" class="preview-img">` : ""}
      </section>
    `;

    if(data.simple?.incluye){
      contenido += `<section class="section check-list"><h2>Incluye</h2>${data.simple.incluye.split("\n").map(x=>x.trim()?`<p>✓ ${x}</p>`:"").join("")}</section>`;
    }

    if(data.simple?.noIncluye){
      contenido += `<section class="section check-list"><h2>No incluye</h2>${data.simple.noIncluye.split("\n").map(x=>x.trim()?`<p>✗ ${x}</p>`:"").join("")}</section>`;
    }

    let hotelesHtml = "";
    (data.hoteles || []).forEach(h=>{
      hotelesHtml += `
        <div class="hotel-card">
          <h3>${h.nombre || "Hotel"}</h3>
          ${h.etiqueta ? `<span class="badge">${h.etiqueta}</span>` : ""}
          ${h.estado ? `<span class="badge">${h.estado}</span>` : ""}
          ${h.categoria ? `<p><strong>Categoría:</strong> ${h.categoria}</p>` : ""}
          ${h.habitacion ? `<p><strong>Habitación:</strong> ${h.habitacion}</p>` : ""}
          ${h.regimen ? `<p><strong>Régimen:</strong> ${h.regimen}</p>` : ""}
          ${h.precio ? `<p><strong>Precio:</strong> ${h.precio}</p>` : ""}
          ${h.link ? `<p><a href="${h.link}" target="_blank">Ver hotel en Google</a></p>` : ""}
        </div>
      `;
    });

    contenido += `<section class="section"><h2>Opciones de alojamiento</h2>${hotelesHtml || "<p>No se agregaron hoteles.</p>"}</section>`;
  } else {
    let tramosHtml = "";
    (data.tramos || []).forEach(t=>{
      tramosHtml += `
        <div class="hotel-card">
          <h3>${t.tipo}: ${t.titulo}</h3>
          ${t.fechas ? `<p><strong>Fechas:</strong> ${t.fechas}</p>` : ""}
          ${t.duracion ? `<p><strong>Duración / noches:</strong> ${t.duracion}</p>` : ""}
          ${t.detalle ? `<p><strong>Detalle:</strong><br>${escapeLineas(t.detalle)}</p>` : ""}
          ${t.regimen ? `<p><strong>Incluye / empresa:</strong> ${t.regimen}</p>` : ""}
          ${t.precio ? `<p><strong>Precio:</strong> ${t.precio}</p>` : ""}
          ${t.estado ? `<p><span class="badge">${t.estado}</span></p>` : ""}
          ${t.link ? `<p><a href="${t.link}" target="_blank">Ver link / ubicación</a></p>` : ""}
          ${t.imagen ? `<img src="${t.imagen}" class="preview-img">` : ""}
        </div>
      `;
    });
    contenido += `<section class="section"><h2>Itinerario y servicios</h2>${tramosHtml || "<p>No se agregaron tramos.</p>"}</section>`;
  }

  const precio = precioPrincipal(data.precioTotal || "");
  const nota = notaPrecio(data.precioTotal || "");

  return `
    <div class="header-etnika">
      <img src="DEGRADADO CON LEGAJO.png" alt="ETNIKA TRAVEL">
    </div>

    <main class="container">
      <section class="hero-destino">
        <h1>${destinoTitulo(data)}</h1>
        <div class="fecha">${fechaSubtitulo(data)}</div>
      </section>

      <section class="card info-grid">
        <div class="info-item">
          <div class="info-icon">♡</div>
          <div class="info-label">Cliente</div>
          <div class="info-value">${data.cliente || "-"}</div>
        </div>

        <div class="info-item">
          <div class="info-icon">☑</div>
          <div class="info-label">Fecha de viaje</div>
          <div class="info-value">${data.fechaViaje || "-"}</div>
        </div>

        <div class="info-item">
          <div class="info-icon">☑</div>
          <div class="info-label">Fecha de cotización</div>
          <div class="info-value">${data.fechaCotizacion || "-"}</div>
        </div>

        <div class="info-item">
          <div class="info-icon">♙</div>
          <div class="info-label">Asesora</div>
          <div class="info-value">${data.vendedora || "-"}</div>
        </div>

        <div class="info-item">
          <div class="info-icon">◇</div>
          <div class="info-label">Cotización N°</div>
          <div class="info-value codigo">${data.codigo || "-"}</div>
        </div>
      </section>

      ${precio ? `
        <section class="price-card">
          <div class="price-label">Precio total</div>
          <div class="price-value">${precio}</div>
          ${nota ? `<div class="price-note">${nota}</div>` : ""}
        </section>
      ` : ""}

      ${contenido}

      <section class="section">
        <h2>Forma de pago</h2>
        <p>${escapeLineas(data.formaPago || "")}</p>
      </section>

      <section class="section">
        <h2>Condiciones importantes</h2>
        <p>${escapeLineas(data.observaciones || "")}</p>
        <p>La contratación implica la aceptación de las <a href="https://etnikatravel.tur.ar/general-conditions" target="_blank">Condiciones Generales de ETNIKA TRAVEL</a>.</p>
      </section>

      <section class="footer-card">
        <div class="footer-grid">
          <div class="footer-item">
            <div class="footer-icon">◎</div>
            <strong>Web</strong><br>
            etnikatravel.tur.ar
          </div>

          <div class="footer-item">
            <div class="footer-icon">☏</div>
            <strong>WhatsApp</strong><br>
            +54 9 341 217 7311
          </div>

          <div class="footer-item">
            <div class="footer-icon">▣</div>
            <strong>Instagram</strong><br>
            @etnikatravel
          </div>

          <div class="footer-item">
            <div class="footer-icon">⌖</div>
            <strong>Legajo EVT Nº 18418</strong><br>
            CUIT 30-71775467-7
          </div>
        </div>
      </section>

      <div class="eslogan">Viajamos con vos, creamos experiencias inolvidables.</div>

      <div class="legal">
        <p>Tarifas sujetas a modificación sin previo aviso y según disponibilidad al momento de la reserva.</p>
        <p>Pagos en dólar billete; no se aceptan billetes escritos ni manchados.</p>
        <p>Términos y condiciones generales disponibles en nuestra web WWW.ETNIKATRAVEL.TUR.AR</p>
        <p><strong>ETNIKA TRAVEL Agencia de Viajes</strong> - Leg Nº 18418 - Rodríguez 1179, Rosario, Santa Fe / TEL: 3412177311 / MAIL: info@etnikatravel.tur.ar</p>
        ${data.validez ? `<p class="validez-small">Validez de la cotización: ${data.validez}</p>` : ""}
      </div>
    </main>
  `;
}

async function cargar(){
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("id");

  if(!codigo){
    document.getElementById("cotizacion").innerHTML = `
      <div class="header-etnika"><img src="DEGRADADO CON LEGAJO.png" alt="ETNIKA TRAVEL"></div>
      <div class="container"><div class="section"><h2>No se indicó una cotización.</h2></div></div>
    `;
    return;
  }

  const { data, error } = await supabaseClient
    .from("cotizaciones")
    .select("*")
    .eq("codigo", codigo)
    .single();

  if(error || !data){
    document.getElementById("cotizacion").innerHTML = `
      <div class="header-etnika"><img src="DEGRADADO CON LEGAJO.png" alt="ETNIKA TRAVEL"></div>
      <div class="container"><div class="section"><h2>No encontramos esta cotización.</h2></div></div>
    `;
    console.error(error);
    return;
  }

  const datos = JSON.parse(data.datos_json);
  document.getElementById("cotizacion").innerHTML = renderCotizacion(datos);
}

cargar();
</script>

</body>
</html>
