<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNIKA TRAVEL | Cotización</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --violeta:#7700E0;
  --turquesa:#00E5BF;
  --gris-suave:#f7f7fb;
  --texto:#2a2a2a;
  --borde:#e9e9ef;
  --sombra:0 14px 38px rgba(32,18,54,.09);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, Helvetica, sans-serif;}
body{background:radial-gradient(circle at top left,rgba(0,229,191,.16),transparent 32%),radial-gradient(circle at top right,rgba(119,0,224,.14),transparent 32%),var(--gris-suave);color:var(--texto);}
.header{background:white;text-align:center;padding:18px 20px 14px;border-bottom:1px solid var(--borde);}
.logo{max-width:260px;width:100%;height:auto;}
.container{max-width:1180px;margin:28px auto 42px;padding:0 20px;}
.card{background:white;border-radius:24px;padding:28px;margin-bottom:24px;box-shadow:var(--sombra);border:1px solid rgba(255,255,255,.85);}
.section-title{color:var(--violeta);font-size:28px;margin-bottom:20px;font-weight:900;}
.data-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
.data-box{background:#fbfbff;border:1px solid var(--borde);border-radius:16px;padding:16px 18px;min-height:78px;display:flex;align-items:center;gap:12px;}
.data-icon{font-size:28px;color:var(--violeta);line-height:1;}
.data-label{font-size:14px;font-weight:900;color:#555;margin-bottom:5px;}
.data-value{font-size:17px;color:#111;line-height:1.25;}
.destination-box{margin-top:18px;border:1px solid var(--borde);border-radius:18px;padding:26px 20px;text-align:center;background:linear-gradient(180deg,#ffffff,#fbfbff);}
.destination-title{font-size:54px;line-height:1;font-weight:900;text-transform:uppercase;letter-spacing:-1px;color:var(--violeta);}
.destination-date{margin-top:14px;font-size:26px;font-weight:900;color:var(--turquesa);text-transform:uppercase;}
.includes-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;}
.include-item{background:#fbfbff;border:1px solid var(--borde);border-radius:16px;padding:18px 12px;min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;font-size:15px;font-weight:800;flex:0 1 190px;}
.include-icon{color:var(--violeta);font-size:30px;line-height:1;}
.flights-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.flight-box{background:#fbfbff;border:1px solid var(--borde);border-left:6px solid var(--turquesa);border-radius:18px;padding:18px 20px;line-height:1.45;font-size:17px;}
.flight-title{color:var(--violeta);font-weight:900;margin-bottom:8px;}
.preview-img{display:block;max-width:min(100%,820px);width:auto;max-height:520px;height:auto;object-fit:contain;border-radius:16px;margin:18px auto 0;box-shadow:0 8px 20px rgba(0,0,0,.08);}
.hotel-list{display:flex;flex-direction:column;gap:16px;}
.hotel-card{background:white;border:1px solid var(--borde);border-radius:22px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.06);}
.hotel-row{display:grid;grid-template-columns:1fr 270px;gap:26px;align-items:center;}
.hotel-name{font-size:26px;line-height:1.12;font-weight:900;color:var(--violeta);margin-bottom:12px;white-space:pre-line;word-break:break-word;overflow-wrap:anywhere;}
.hotel-detail{font-size:18px;line-height:1.55;color:#333;}
.hotel-detail strong{color:#555;}
.hotel-price{text-align:center;}
.hotel-price-value{color:var(--violeta);font-size:clamp(22px,3vw,36px);font-weight:900;line-height:1.08;white-space:pre-line;word-break:break-word;overflow-wrap:anywhere;text-align:center;}
.hotel-price-note{color:#666;font-size:15px;margin-top:8px;}
.hotel-actions{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
.btn{border:none;padding:13px 18px;border-radius:999px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;justify-content:center;align-items:center;text-align:center;font-size:15px;}
.btn-google{background:#f0f0f0;color:#222;}
.btn-option{background:linear-gradient(135deg,var(--turquesa),#7be2c4);color:#061b16;}
.info-section{background:#fbfbff;border:1px solid var(--borde);border-radius:18px;padding:18px 20px;line-height:1.5;font-size:16px;}
.footer{text-align:center;}
.footer h3{color:var(--violeta);font-size:22px;margin-bottom:8px;}
.footer p{margin:7px 0;line-height:1.45;}
.legal{text-align:center;color:#777;font-size:12px;line-height:1.5;margin-top:18px;}
.validez{font-size:12px;color:#777;text-align:center;margin-top:10px;}
a{color:var(--violeta);font-weight:800;}
@media(max-width:900px){.data-grid{grid-template-columns:repeat(2,1fr);}.flights-grid{grid-template-columns:1fr;}.hotel-row{grid-template-columns:1fr;}.hotel-price{text-align:center;}.hotel-actions{max-width:320px;margin-left:auto;margin-right:auto;}.destination-title{font-size:42px;}.destination-date{font-size:22px;}}
@media(max-width:560px){.container{padding:0 12px;margin-top:18px;}.header{padding:16px 12px 12px;}.logo{max-width:220px;}.card{padding:20px;border-radius:20px;}.data-grid{grid-template-columns:1fr;}.include-item{flex-basis:100%;}.destination-title{font-size:34px;}.destination-date{font-size:19px;}.hotel-name{font-size:22px;}.hotel-price-value{font-size:clamp(20px,7vw,30px);}}

.hotel-stars{
  color:var(--violeta);
  font-size:20px;
  font-weight:900;
  letter-spacing:2px;
  margin:-4px 0 10px;
}
.combo-title{
  color:var(--violeta);
  font-size:26px;
  font-weight:900;
  margin-bottom:16px;
  text-transform:uppercase;
}
.combo-service{
  background:#fbfbff;
  border:1px solid var(--borde);
  border-radius:16px;
  padding:16px;
  margin:10px 0;
}
.combo-destination{
  color:#222;
  font-weight:900;
  font-size:18px;
  margin-bottom:5px;
  text-transform:uppercase;
}
.destination-group-title{background:#f5f0ff;color:var(--violeta);font-weight:900;font-size:20px;text-transform:uppercase;border-radius:14px;padding:12px 16px;margin:10px 0 14px;}
.combo-plus{
  color:var(--violeta);
  font-size:24px;
  font-weight:900;
  text-align:center;
  margin:8px 0;
}


.price-table{
  margin-top:14px;
  border:1px solid var(--borde);
  border-radius:16px;
  overflow:hidden;
}
.price-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:14px;
  padding:12px 14px;
  border-bottom:1px solid var(--borde);
  align-items:center;
}
.price-row:last-child{
  border-bottom:none;
}
.price-composition{
  font-weight:800;
  color:#333;
}
.price-amount{
  color:var(--violeta);
  font-size:clamp(17px,2.2vw,22px);
  font-weight:900;
  white-space:pre-line;
  word-break:break-word;
  overflow-wrap:anywhere;
  text-align:center;
}
.price-type{
  color:#666;
  font-size:12px;
  text-transform:uppercase;
  margin-top:3px;
}
.tramo-extra{
  margin-top:10px;
  background:#fbfbff;
  border:1px solid var(--borde);
  border-left:6px solid var(--turquesa);
  border-radius:14px;
  padding:14px;
  line-height:1.45;
}


.family-price-table{
  margin-top:18px;
  border:1px solid var(--borde);
  border-radius:16px;
  overflow:hidden;
  background:#fff;
  width:100%;
}
.family-price-header,
.family-price-row{
  display:grid;
  grid-template-columns:1fr 1.25fr 1fr;
  align-items:stretch;
}
.family-price-header{
  background:#f5f0ff;
  color:var(--violeta);
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  border-bottom:1px solid var(--borde);
}
.family-price-header > div,
.family-price-row > div{
  padding:13px 14px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  border-right:1px solid var(--borde);
}
.family-price-header > div:last-child,
.family-price-row > div:last-child{
  border-right:none;
}
.family-price-row{
  border-bottom:1px solid var(--borde);
}
.family-price-row:nth-child(even){
  background:#fcfcff;
}
.family-price-row:last-child{
  border-bottom:none;
}
.family-name{
  font-weight:800;
  color:#222;
}
.family-rooms{
  color:#555;
  font-weight:700;
}
.family-amount{
  color:var(--violeta);
  font-size:clamp(16px,2.1vw,21px);
  font-weight:900;
  white-space:pre-line;
  word-break:break-word;
  overflow-wrap:anywhere;
  text-align:center;
}
.hotel-card.full-layout .hotel-row{
  grid-template-columns:1fr;
}
.option-actions-bottom{
  margin-top:18px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.option-actions-bottom .btn{
  min-width:240px;
}


.etnika-icon{
  width:36px;
  height:36px;
  object-fit:contain;
  flex:0 0 auto;
}
.include-icon-img{
  width:52px;
  height:52px;
  object-fit:contain;
  display:block;
}
.data-box .etnika-icon{
  width:34px;
  height:34px;
}


.include-item{justify-content:flex-start !important;padding-top:24px !important;}
.include-icon-img{margin-bottom:12px;}
.include-item span{min-height:44px;display:flex;align-items:flex-start;justify-content:center;text-align:center;}
.destination-date{display:flex;align-items:center;justify-content:center;gap:10px;}
.destination-date img{width:34px;height:34px;object-fit:contain;}
</style>
</head>
<body>
<header class="header"><img src="DEGRADADO CON LEGAJO.png" class="logo" alt="ETNIKA TRAVEL"></header>
<main class="container"><section id="cotizacion"><div class="card"><h2 class="section-title">Cargando cotización...</h2></div></section></main>

<script>
const SUPABASE_URL = "https://izuvvwnqczvmphuvjzyf.supabase.co";
const SUPABASE_KEY = "sb_publishable_r8syG_LzXy7NUymta20UFA_kPjGw_HN";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeLineas(texto){return texto ? String(texto).replace(/\n/g,"<br>") : "";}
function limpiarPrecio(precio){return precio ? String(precio).replace(/precio final grupo familiar/ig,"").trim() : "";}
function tipoPrecioLabel(tipo){if(!tipo)return"Precio final grupo familiar";const t=String(tipo).toLowerCase();if(t.includes("persona"))return"Precio por persona";if(t.includes("total"))return"Precio total";return"Precio final grupo familiar";}
function textoWhatsApp(data, hotel){const numero=data.whatsapp?String(data.whatsapp).replace(/\D/g,""):"5493412177311";const msg=encodeURIComponent("Hola, quiero avanzar con esta opción de ETNIKA TRAVEL:\n\nAgente: "+(data.vendedora||"")+"\nCotización: "+(data.codigo||"")+"\nDestino: "+(data.destino||"")+"\nFecha: "+(data.fechaViaje||"")+"\nHotel: "+(hotel.nombre||"")+"\nPrecio: "+(hotel.precio||""));return `https://wa.me/${numero}?text=${msg}`;}

function iconoIncluye(texto, i){
  if(typeof texto === "object" && texto.icono) return "icons/" + texto.icono;
  const t = String(texto || "").toLowerCase();

  if(t.includes("aéreo") || t.includes("aereo") || t.includes("vuelo") || t.includes("pasaje")) return "icons/icon_avion.png";
  if(t.includes("equipaje") || t.includes("valija") || t.includes("mochila") || t.includes("carry")) return "icons/icon_valija.png";
  if(t.includes("traslado") || t.includes("bus") || t.includes("transfer")) return "icons/icon_bus.png";
  if(t.includes("alojamiento") || t.includes("hotel") || t.includes("noche")) return "icons/icon_hotel.png";
  if(t.includes("régimen") || t.includes("regimen") || t.includes("all inclusive") || t.includes("desayuno") || t.includes("comida") || t.includes("pensión") || t.includes("pension")) return "icons/icon_comida.png";
  if(t.includes("asistencia") || t.includes("seguro") || t.includes("médica") || t.includes("medica")) return "icons/icon_medico.png";
  if(t.includes("asesor") || t.includes("coordinación") || t.includes("coordinacion") || t.includes("etnika")) return "icons/icon_agente.png";
  if(t.includes("crucero") || t.includes("barco")) return "icons/icon_crucero.png";
  if(t.includes("café") || t.includes("cafe") || t.includes("bebida")) return "icons/icon_cafe.png";

  const fallback = [
    "icons/icon_avion.png",
    "icons/icon_valija.png",
    "icons/icon_bus.png",
    "icons/icon_hotel.png",
    "icons/icon_agente.png",
    "icons/icon_calendario.png"
  ];

  return fallback[i % fallback.length];
}

function renderIncluye(data){
  const items=data.incluyeItems&&data.incluyeItems.length?data.incluyeItems:[
    {icono:"icon_avion.png", texto:"Aéreo incluido"},
    {icono:"icon_valija.png", texto:"Equipaje incluido"},
    {icono:"icon_bus.png", texto:"Traslados en destino"},
    {icono:"icon_hotel.png", texto:"Alojamiento según opción elegida"},
    {icono:"icon_agente.png", texto:"Asesoramiento ETNIKA"}
  ];

  return `<section class="card"><h2 class="section-title">Tu viaje incluye</h2><div class="includes-grid">${
    items.map((item,i)=>{
      const texto = typeof item === "object" ? (item.texto || item.detalle || "") : item;
      return `
        <div class="include-item">
          <img src="${iconoIncluye(item,i)}" class="include-icon-img" alt="">
          <span>${escapeLineas(texto)}</span>
        </div>
      `;
    }).join("")
  }</div></section>`;
}
function renderVuelos(data){
  const simple = data.simple || {};

  const opcionPrincipal = {
    fecha: simple.fechaVuelo || simple.fechaVuelos || "",
    detalle: simple.detalleVuelos || [simple.vueloIda, simple.vueloVuelta].filter(Boolean).join("\n\n"),
    precio: simple.precioVuelo || "",
    tipoPrecio: simple.tipoPrecioVuelo || "",
    captura: simple.capturaVuelo || ""
  };

  const opcionesGuardadas = []
    .concat((opcionPrincipal.fecha || opcionPrincipal.detalle || opcionPrincipal.precio || opcionPrincipal.captura) ? [opcionPrincipal] : [])
    .concat(Array.isArray(simple.vuelosOpciones) ? simple.vuelosOpciones : [])
    .concat(Array.isArray(simple.opcionesVuelos) ? simple.opcionesVuelos : []);

  const opciones = opcionesGuardadas.filter(v => v && (
    v.fecha || v.detalle || v.precio || v.captura || v.capturaVuelo || v.imagen
  ));

  if(!opciones.length) return "";

  return `<section class="card"><h2 class="section-title">Vuelos</h2>${
    opciones.map((v,i)=>{
      const captura = v.captura || v.capturaVuelo || v.imagen || "";
      return `
        <div class="hotel-card" style="margin-top:${i ? "18px" : "0"};">
          <div class="flight-box">
            <div class="flight-title">Opción de vuelo ${i+1}</div>
            ${v.fecha ? `<div><strong>Fecha:</strong> ${escapeLineas(v.fecha)}</div>` : ""}
            ${v.detalle ? `<div style="margin-top:8px;">${escapeLineas(v.detalle)}</div>` : ""}
            ${v.precio ? `<div class="hotel-price" style="margin-top:12px;text-align:left;"><div class="hotel-price-value" style="text-align:left;">${escapeLineas(v.precio)}</div><div class="hotel-price-note">${tipoPrecioLabel(v.tipoPrecio || simple.tipoPrecioVuelo)}</div></div>` : ""}
          </div>
          ${captura ? `<img src="${captura}" class="preview-img">` : ""}
        </div>
      `;
    }).join("")
  }</section>`;
}

function renderPrecios(precios, fallbackPrecio, fallbackTipo){
  if(precios && precios.length){
    return `<div class="price-table">
      ${precios.map(p=>`
        <div class="price-row">
          <div>
            <div class="price-composition">${p.composicion || ""}</div>
            <div class="price-type">${tipoPrecioLabel(p.tipoPrecio || fallbackTipo)}</div>
          </div>
          <div class="price-amount">${escapeLineas(limpiarPrecio(p.precio || ""))}</div>
        </div>
      `).join("")}
    </div>`;
  }

  if(fallbackPrecio){
    return `
      <div class="hotel-price-value">${limpiarPrecio(fallbackPrecio)}</div>
      <div class="hotel-price-note">${tipoPrecioLabel(fallbackTipo)}</div>
    `;
  }

  return "";
}


function renderTablaFamilias(precios){
  if(!precios || !precios.length) return "";

  return `
    <div class="family-price-table">
      <div class="family-price-header">
        <div>Familia</div>
        <div>Habitaciones</div>
        <div>Precio final</div>
      </div>
      ${precios.map(p=>`
        <div class="family-price-row">
          <div class="family-name">${p.composicion || p.familia || ""}</div>
          <div class="family-rooms">${p.habitaciones || ""}</div>
          <div class="family-amount">${escapeLineas(limpiarPrecio(p.precio || ""))}</div>
        </div>
      `).join("")}
    </div>
  `;
}

function renderHoteles(data){
  const hoteles=data.hoteles||[];
  const combos=data.combos||[];
  if(!hoteles.length && !combos.length)return"";

  const hotelesHtml = hoteles.map(h=>{
    const tieneTabla = h.precios && h.precios.length;

    return `
      <div class="hotel-card ${tieneTabla ? "full-layout" : ""}">
        <div class="hotel-row">
          <div>
            <div class="hotel-name">${escapeLineas(h.nombre||"Hotel")}</div>
            ${h.categoria?`<div class="hotel-stars">${h.categoria}</div>`:""}
            ${h.habitacion?`<div class="hotel-detail"><strong>Hab.</strong> ${h.habitacion}</div>`:""}
            ${h.regimen?`<div class="hotel-detail"><strong>Régimen:</strong> ${h.regimen}</div>`:""}
            ${h.estado?`<div class="hotel-detail"><strong>Estado:</strong> ${h.estado}</div>`:""}

            ${tieneTabla ? renderTablaFamilias(h.precios) : ""}
          </div>

          ${!tieneTabla ? `
            <div class="hotel-price">
              ${h.precio?`<div class="hotel-price-value">${escapeLineas(limpiarPrecio(h.precio))}</div>`:""}
              <div class="hotel-price-note">${tipoPrecioLabel(h.tipoPrecio||data.tipoPrecio)}</div>
              <div class="hotel-actions">
                ${h.link?`<a class="btn btn-google" href="${h.link}" target="_blank">Ver hotel en Google</a>`:""}
                <a class="btn btn-option" href="${textoWhatsApp(data,h)}" target="_blank">Quiero esta opción</a>
              </div>
            </div>
          ` : `
            <div class="option-actions-bottom">
              ${h.link?`<a class="btn btn-google" href="${h.link}" target="_blank">Ver hotel en Google</a>`:""}
              <a class="btn btn-option" href="${textoWhatsApp(data,h)}" target="_blank">Quiero esta opción</a>
            </div>
          `}
        </div>
      </div>
    `;
  }).join("");

  const combosHtml = combos.map(c=>{
    const tieneTabla = c.precios && c.precios.length;

    return `
      <div class="hotel-card full-layout">
        <div class="hotel-row">
          <div>
            <div class="combo-title">${c.titulo || "Opción combinada"}</div>

            ${(c.servicios||[]).map((s,i)=>`
              ${i>0?`<div class="combo-plus">+</div>`:""}
              <div class="combo-service">
                <div class="combo-destination">${s.destino || ""}${s.noches ? " · " + s.noches : ""}</div>
                <div class="hotel-name" style="font-size:22px;margin-bottom:6px;">${escapeLineas(s.hotel || "")}</div>
                ${s.categoria?`<div class="hotel-stars">${s.categoria}</div>`:""}
                ${s.habitacion?`<div class="hotel-detail"><strong>Hab.</strong> ${s.habitacion}</div>`:""}
                ${s.regimen?`<div class="hotel-detail"><strong>Régimen:</strong> ${s.regimen}</div>`:""}
                ${s.link?`<div class="hotel-detail"><a href="${s.link}" target="_blank">Ver hotel en Google</a></div>`:""}
              </div>
            `).join("")}

            ${c.estado?`<div class="hotel-detail"><strong>Estado:</strong> ${c.estado}</div>`:""}

            ${tieneTabla ? renderTablaFamilias(c.precios) : `
              <div class="hotel-price" style="text-align:left;margin-top:18px;">
                ${c.precio?`<div class="hotel-price-value">${escapeLineas(limpiarPrecio(c.precio))}</div>`:""}
                <div class="hotel-price-note">${tipoPrecioLabel(c.tipoPrecio||data.tipoPrecio)}</div>
              </div>
            `}

            <div class="option-actions-bottom">
              <a class="btn btn-option" href="${textoWhatsApp(data,{nombre:c.titulo||'Opción combinada',precio:c.precio||''})}" target="_blank">Quiero esta opción</a>
            </div>
          </div>
        </div>
      </div>
    `;
  }).join("");

  return `<section class="card"><h2 class="section-title">Opciones de alojamiento</h2><div class="hotel-list">${hotelesHtml}${combosHtml}</div></section>`;
}
function renderTramoCard(t){
  const tipo=t.tipo||"Tramo";
  const esHotel=tipo==="Hotel";
  return `<div class="hotel-card">
      <div class="hotel-row">
        <div>
          <div class="hotel-name">${escapeLineas(esHotel ? (t.titulo||"Hotel") : `${tipo}: ${t.titulo||""}`)}</div>
          ${(!esHotel && t.fechas)?`<div class="hotel-detail"><strong>Fecha:</strong> ${t.fechas}</div>`:""}
          ${(!esHotel && t.duracion)?`<div class="hotel-detail"><strong>Duración:</strong> ${t.duracion}</div>`:""}
          ${t.detalle?`<div class="hotel-detail">${escapeLineas(t.detalle)}</div>`:""}
          ${t.detalleExtra?`<div class="tramo-extra">${escapeLineas(t.detalleExtra)}</div>`:""}
          ${t.regimen?`<div class="hotel-detail"><strong>Incluye / empresa:</strong> ${t.regimen}</div>`:""}
          ${t.estado?`<div class="hotel-detail"><strong>Estado:</strong> ${t.estado}</div>`:""}
          ${t.link?`<div class="hotel-detail"><a href="${t.link}" target="_blank">Ver link / ubicación</a></div>`:""}
          ${t.imagen?`<img src="${t.imagen}" class="preview-img">`:""}
        </div>
        <div class="hotel-price">${t.precio?`<div class="hotel-price-value">${escapeLineas(limpiarPrecio(t.precio))}</div>`:""}</div>
      </div>
    </div>`;
}
function renderTramos(data){
  const destinos=data.destinos||[];
  const tramos=data.tramos||[];
  if(!destinos.length && !tramos.length)return"";
  const destinosHtml=destinos.map(d=>`
    <div class="destination-group">
      <div class="destination-group-title">${d.fechas||""} ${d.destino||""}${d.noches?` - ${d.noches}`:""}</div>
      ${(d.tramos||[]).map(renderTramoCard).join("")}
    </div>`).join("");
  const sueltosHtml=tramos.map(renderTramoCard).join("");
  return `<section class="card"><h2 class="section-title">Itinerario y servicios</h2><div class="hotel-list">${destinosHtml}${sueltosHtml}</div></section>`;
}
function renderCotizacion(data){return `<section class="card"><h2 class="section-title">Datos de la cotización</h2><div class="data-grid">${data.cliente?`<div class="data-box"><img src="icons/top_cliente.png" class="etnika-icon" alt=""><div><div class="data-label">Cliente</div><div class="data-value">${data.cliente}</div></div></div>`:""}${data.pasajeros?`<div class="data-box"><img src="icons/top_pasajeros.png" class="etnika-icon" alt=""><div><div class="data-label">Pasajeros</div><div class="data-value">${data.pasajeros}</div></div></div>`:""}${data.fechaCotizacion?`<div class="data-box"><img src="icons/top_fecha.png" class="etnika-icon" alt=""><div><div class="data-label">Fecha de cotización</div><div class="data-value">${data.fechaCotizacion}</div></div></div>`:""}${data.codigo?`<div class="data-box"><img src="icons/top_cotizacion.png" class="etnika-icon" alt=""><div><div class="data-label">Cotización</div><div class="data-value">${data.codigo}</div></div></div>`:""}${data.vendedora?`<div class="data-box"><img src="icons/top_agente.png" class="etnika-icon" alt=""><div><div class="data-label">Agente</div><div class="data-value">${data.vendedora}</div></div></div>`:""}</div><div class="destination-box"><div class="destination-title">${data.destino||"Cotización de viaje"}</div>${data.fechaViaje?`<div class="destination-date"><img src="icons/icon_calendario.png" alt="">${data.fechaViaje}</div>`:""}</div></section>${renderIncluye(data)}${data.modo==="completo"?renderTramos(data):((data.tipoSimple||"paquete")!=="solo_hotel"?renderVuelos(data):"")}${data.modo==="simple"&&((data.tipoSimple||"paquete")!=="solo_vuelos")?renderHoteles(data):""}${data.formaPago?`<section class="card"><h2 class="section-title">Forma de pago</h2><div class="info-section">${escapeLineas(data.formaPago)}</div></section>`:""}${data.mostrarObservaciones&&data.observaciones?`<section class="card"><h2 class="section-title">Observaciones</h2><div class="info-section">${escapeLineas(data.observaciones)}</div></section>`:""}<section class="card footer"><h3>ETNIKA TRAVEL S.R.L.</h3><p>Legajo EVT Nº 18418 | CUIT 30-71775467-7</p><p><a href="https://maps.app.goo.gl/QGwE9kNAV4aiuszz9" target="_blank">📍 Ver oficina en Google Maps</a></p><p>🕒 Lunes a Viernes de 10:00 a 18:00 hs</p><p><a href="https://etnikatravel.tur.ar" target="_blank">🌐 etnikatravel.tur.ar</a> | <a href="https://instagram.com/etnikatravel" target="_blank">📸 @etnikatravel</a></p><p><a href="https://etnikatravel.tur.ar/general-conditions" target="_blank">Condiciones generales de contratación</a></p>${data.whatsapp?`<p><a class="btn btn-option" href="https://wa.me/${String(data.whatsapp).replace(/\D/g,"")}" target="_blank">📲 Contactar por WhatsApp</a></p>`:""}<div class="legal">Tarifas sujetas a disponibilidad y modificación sin previo aviso hasta el momento de la reserva y emisión.${data.validez?`<div class="validez">Validez de la cotización: ${data.validez}</div>`:""}</div></section>`;}
async function cargar(){const params=new URLSearchParams(window.location.search);const codigo=params.get("id");if(!codigo){document.getElementById("cotizacion").innerHTML='<div class="card"><h2 class="section-title">No se indicó una cotización.</h2></div>';return;}const {data,error}=await supabaseClient.from("cotizaciones").select("*").eq("codigo",codigo).single();if(error||!data){document.getElementById("cotizacion").innerHTML='<div class="card"><h2 class="section-title">No encontramos esta cotización.</h2></div>';console.error(error);return;}const datos=JSON.parse(data.datos_json);datos.codigo=codigo||data.codigo||datos.codigo||"";document.getElementById("cotizacion").innerHTML=renderCotizacion(datos);}
cargar();
</script>
