<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNIKA TRAVEL | Cotización</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --violeta:#7700E0;
  --violeta-oscuro:#4d0099;
  --turquesa:#00E5BF;
  --gris:#F2F2F2;
  --gris-suave:#f7f7fb;
  --oscuro:#171717;
  --texto:#2a2a2a;
  --borde:#e9e9ef;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{
  background:
    radial-gradient(circle at top left, rgba(0,229,191,.18), transparent 34%),
    radial-gradient(circle at top right, rgba(119,0,224,.18), transparent 30%),
    var(--gris-suave);
  color:var(--texto);
}
.container{max-width:1100px;margin:32px auto;padding:0 20px}
.preview{
  background:white;
  border-radius:28px;
  padding:0;
  overflow:hidden;
  box-shadow:0 18px 48px rgba(32,18,54,.13);
}
.preview-logo{
  text-align:center;
  padding:30px 20px;
  background:white;
  border-bottom:1px solid var(--borde);
}
.preview-logo img{max-width:310px;width:100%}
h2{
  color:var(--violeta);
  margin-bottom:18px;
  font-size:28px;
  letter-spacing:-.3px;
}
.preview > h2{padding:26px 30px 0}
.preview-section{
  border-left:6px solid var(--turquesa);
  background:#fbfbff;
  border-radius:18px;
  padding:20px;
  margin:18px 30px;
  border-top:1px solid #f0eff5;
  border-right:1px solid #f0eff5;
  border-bottom:1px solid #f0eff5;
}
.preview-section h3{color:var(--violeta);margin-bottom:10px;font-size:21px}
.hotel-card{
  border:1px solid #eceaf2;
  border-radius:20px;
  padding:20px;
  margin:18px 30px;
  background:white;
  box-shadow:0 8px 22px rgba(0,0,0,.06);
}
.hotel-card h3{color:var(--violeta);font-size:22px;margin-bottom:8px}
.badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--turquesa),#b7fff0);
  color:#06352d;
  border-radius:999px;
  padding:5px 12px;
  font-weight:800;
  font-size:12px;
  margin:4px 5px 10px 0;
}
.price-big{font-size:34px;font-weight:900;color:var(--violeta);margin-top:10px}
.preview-img{max-width:100%;border-radius:16px;margin-top:14px;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.btn{
  border:none;
  padding:14px 22px;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}
.btn-whatsapp{background:var(--turquesa);color:#061b16}
a{color:var(--violeta);font-weight:bold}
@media(max-width:700px){
  .container{margin:18px auto;padding:0 12px}
  .preview{border-radius:22px}
  .preview > h2{padding:22px 16px 0;font-size:24px}
  .preview-section,.hotel-card{margin:16px;padding:18px}
  .preview-logo img{max-width:260px}
}

.top-icon{
  width:36px;
  height:36px;
  object-fit:contain;
  flex:0 0 auto;
}
.data-box .top-icon{
  width:34px;
  height:34px;
}
.destination-date .top-icon{
  width:34px;
  height:34px;
}

</style>
</head>

<body>
<div class="container">
  <section class="preview" id="cotizacion">
    <h2>Cargando cotización...</h2>
  </section>
</div>

<script>
const SUPABASE_URL = "https://izuvvwnqczvmphuvjzyf.supabase.co";
const SUPABASE_KEY = "sb_publishable_r8syG_LzXy7NUymta20UFA_kPjGw_HN";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeLineas(texto){ return texto ? texto.replace(/\n/g,"<br>") : ""; }


function formatoTextoNormal(texto){
  if(!texto) return "";
  const lowerWords = ["de","del","la","las","los","y","e"];
  return String(texto)
    .toLowerCase()
    .replace(/\s+/g," ")
    .trim()
    .split(" ")
    .map((w,i)=> lowerWords.includes(w) && i !== 0 ? w : w.charAt(0).toUpperCase() + w.slice(1))
    .join(" ");
}

function formatoPasajeros(texto){
  if(!texto) return "";
  return String(texto).toLowerCase().replace(/\s+/g," ").trim();
}

function formatoFechaViaje(texto){
  if(!texto) return "";
  let t = String(texto).trim();
  t = t.replace(/\s+/g," ");
  t = t.replace(/\bAL\b/g,"al").replace(/\bAl\b/g,"al");
  return t;
}

function renderCotizacion(data){
  const clienteFmt = formatoTextoNormal(data.cliente || "");
  const pasajerosFmt = formatoPasajeros(data.pasajeros || "");
  const fechaViajeFmt = formatoFechaViaje(data.fechaViaje || "");
  const agenteFmt = formatoTextoNormal(data.vendedora || "");

  return `<section class="card"><h2 class="section-title">Datos de la cotización</h2><div class="data-grid">${
    data.cliente?`<div class="data-box"><img src="icons/top_cliente.png" class="top-icon" alt=""><div><div class="data-label">Cliente</div><div class="data-value">${clienteFmt}</div></div></div>`:""}${
    data.pasajeros?`<div class="data-box"><img src="icons/top_pasajeros.png" class="top-icon" alt=""><div><div class="data-label">Pasajeros</div><div class="data-value">${pasajerosFmt}</div></div></div>`:""}${
    data.fechaCotizacion?`<div class="data-box"><img src="icons/top_fecha.png" class="top-icon" alt=""><div><div class="data-label">Fecha de cotización</div><div class="data-value">${data.fechaCotizacion}</div></div></div>`:""}${
    data.codigo?`<div class="data-box"><img src="icons/top_cotizacion.png" class="top-icon" alt=""><div><div class="data-label">Cotización</div><div class="data-value">${data.codigo}</div></div></div>`:""}${
    data.vendedora?`<div class="data-box"><img src="icons/top_agente.png" class="top-icon" alt=""><div><div class="data-label">Agente</div><div class="data-value">${agenteFmt}</div></div></div>`:""}</div><div class="destination-box"><div class="destination-title">${data.destino||"Cotización de viaje"}</div>${
    data.fechaViaje?`<div class="destination-date"><img src="icons/top_fecha.png" class="top-icon" alt="">${fechaViajeFmt}</div>`:""}</div></section>${
    renderIncluye(data)}${
    data.modo==="completo"?renderTramos(data):((data.tipoSimple||"paquete")!=="solo_hotel"?renderVuelos(data):"")}${
    data.modo==="simple"&&((data.tipoSimple||"paquete")!=="solo_vuelos")?renderHoteles(data):""}${
    data.formaPago?`<section class="card"><h2 class="section-title">Forma de pago</h2><div class="info-section">${escapeLineas(data.formaPago)}</div></section>`:""}${
    data.mostrarObservaciones&&data.observaciones?`<section class="card"><h2 class="section-title">Observaciones</h2><div class="info-section">${escapeLineas(data.observaciones)}</div></section>`:""}<section class="card footer"><h3>ETNIKA TRAVEL S.R.L.</h3><p>Legajo EVT Nº 18418 | CUIT 30-71775467-7</p><p><a href="https://maps.app.goo.gl/QGwE9kNAV4aiuszz9" target="_blank">📍 Ver oficina en Google Maps</a></p><p>🕒 Lunes a Viernes de 10:00 a 18:00 hs</p><p><a href="https://etnikatravel.tur.ar" target="_blank">🌐 etnikatravel.tur.ar</a> | <a href="https://instagram.com/etnikatravel" target="_blank">📸 @etnikatravel</a></p><p><a href="https://etnikatravel.tur.ar/general-conditions" target="_blank">Condiciones generales de contratación</a></p>${
    data.whatsapp?`<p><a class="btn btn-option" href="https://wa.me/${String(data.whatsapp).replace(/\D/g,"")}" target="_blank">📲 Contactar por WhatsApp</a></p>`:""}<div class="legal">Tarifas sujetas a disponibilidad y modificación sin previo aviso hasta el momento de la reserva y emisión.${
    data.validez?`<div class="validez">Validez de la cotización: ${data.validez}</div>`:""}</div></section>`;
}
async function cargar(){
  const params = new URLSearchParams(window.location.search);
  const codigo = params.get("id");

  if(!codigo){
    document.getElementById("cotizacion").innerHTML = "<h2>No se indicó una cotización.</h2>";
    return;
  }

  const { data, error } = await supabaseClient
    .from("cotizaciones")
    .select("*")
    .eq("codigo", codigo)
    .single();

  if(error || !data){
    document.getElementById("cotizacion").innerHTML = "<h2>No encontramos esta cotización.</h2>";
    console.error(error);
    return;
  }

  const datos = JSON.parse(data.datos_json);
  document.getElementById("cotizacion").innerHTML = renderCotizacion(datos);
}

cargar();
</script>

</body>
</html>
