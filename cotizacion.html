<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNIKA TRAVEL | Cotización</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --violeta:#7700E0;
  --turquesa:#00E5BF;
  --gris-suave:#f7f7fb;
  --texto:#2a2a2a;
  --borde:#e9e9ef;
  --sombra:0 14px 38px rgba(32,18,54,.09);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, Helvetica, sans-serif;}
body{background:radial-gradient(circle at top left,rgba(0,229,191,.16),transparent 32%),radial-gradient(circle at top right,rgba(119,0,224,.14),transparent 32%),var(--gris-suave);color:var(--texto);}
.header{background:white;text-align:center;padding:18px 20px 14px;border-bottom:1px solid var(--borde);}
.logo{max-width:260px;width:100%;height:auto;}
.container{max-width:1180px;margin:28px auto 42px;padding:0 20px;}
.card{background:white;border-radius:24px;padding:28px;margin-bottom:24px;box-shadow:var(--sombra);border:1px solid rgba(255,255,255,.85);}
.section-title{color:var(--violeta);font-size:28px;margin-bottom:20px;font-weight:900;}
.data-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
.data-box{background:#fbfbff;border:1px solid var(--borde);border-radius:16px;padding:16px 18px;min-height:78px;display:flex;align-items:center;gap:12px;}
.data-icon{font-size:28px;color:var(--violeta);line-height:1;}
.data-label{font-size:14px;font-weight:900;color:#555;margin-bottom:5px;}
.data-value{font-size:17px;color:#111;line-height:1.25;}
.destination-box{margin-top:18px;border:1px solid var(--borde);border-radius:18px;padding:26px 20px;text-align:center;background:linear-gradient(180deg,#ffffff,#fbfbff);}
.destination-title{font-size:54px;line-height:1;font-weight:900;text-transform:uppercase;letter-spacing:-1px;color:var(--violeta);}
.destination-date{margin-top:14px;font-size:26px;font-weight:900;color:var(--turquesa);text-transform:uppercase;}
.includes-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.include-item{background:#fbfbff;border:1px solid var(--borde);border-radius:16px;padding:18px 12px;min-height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;font-size:15px;font-weight:800;}
.include-icon{color:var(--violeta);font-size:30px;line-height:1;}
.flights-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.flight-box{background:#fbfbff;border:1px solid var(--borde);border-left:6px solid var(--turquesa);border-radius:18px;padding:18px 20px;line-height:1.45;font-size:17px;}
.flight-title{color:var(--violeta);font-weight:900;margin-bottom:8px;}
.preview-img{max-width:100%;border-radius:16px;margin-top:14px;box-shadow:0 8px 20px rgba(0,0,0,.08);}
.hotel-list{display:flex;flex-direction:column;gap:16px;}
.hotel-card{background:white;border:1px solid var(--borde);border-radius:22px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.06);}
.hotel-row{display:grid;grid-template-columns:1fr 270px;gap:26px;align-items:center;}
.hotel-name{font-size:26px;line-height:1.12;font-weight:900;color:var(--violeta);margin-bottom:12px;}
.hotel-detail{font-size:18px;line-height:1.55;color:#333;}
.hotel-detail strong{color:#555;}
.hotel-price{text-align:center;}
.hotel-price-value{color:var(--violeta);font-size:36px;font-weight:900;line-height:1;white-space:nowrap;}
.hotel-price-note{color:#666;font-size:15px;margin-top:8px;}
.hotel-actions{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
.btn{border:none;padding:13px 18px;border-radius:999px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;justify-content:center;align-items:center;text-align:center;font-size:15px;}
.btn-google{background:#f0f0f0;color:#222;}
.btn-option{background:linear-gradient(135deg,var(--turquesa),#7be2c4);color:#061b16;}
.info-section{background:#fbfbff;border:1px solid var(--borde);border-radius:18px;padding:18px 20px;line-height:1.5;font-size:16px;}
.footer{text-align:center;}
.footer h3{color:var(--violeta);font-size:22px;margin-bottom:8px;}
.footer p{margin:7px 0;line-height:1.45;}
.legal{text-align:center;color:#777;font-size:12px;line-height:1.5;margin-top:18px;}
.validez{font-size:12px;color:#777;text-align:center;margin-top:10px;}
a{color:var(--violeta);font-weight:800;}
@media(max-width:900px){.data-grid{grid-template-columns:repeat(2,1fr);}.includes-grid{grid-template-columns:repeat(2,1fr);}.flights-grid{grid-template-columns:1fr;}.hotel-row{grid-template-columns:1fr;}.hotel-price{text-align:left;}.hotel-actions{max-width:320px;}.destination-title{font-size:42px;}.destination-date{font-size:22px;}}
@media(max-width:560px){.container{padding:0 12px;margin-top:18px;}.header{padding:16px 12px 12px;}.logo{max-width:220px;}.card{padding:20px;border-radius:20px;}.data-grid,.includes-grid{grid-template-columns:1fr;}.destination-title{font-size:34px;}.destination-date{font-size:19px;}.hotel-name{font-size:22px;}.hotel-price-value{font-size:30px;}}
</style>
</head>
<body>
<header class="header"><img src="DEGRADADO CON LEGAJO.png" class="logo" alt="ETNIKA TRAVEL"></header>
<main class="container"><section id="cotizacion"><div class="card"><h2 class="section-title">Cargando cotización...</h2></div></section></main>

<script>
const SUPABASE_URL = "https://izuvvwnqczvmphuvjzyf.supabase.co";
const SUPABASE_KEY = "sb_publishable_r8syG_LzXy7NUymta20UFA_kPjGw_HN";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeLineas(texto){return texto ? String(texto).replace(/\n/g,"<br>") : "";}
function limpiarPrecio(precio){return precio ? String(precio).replace(/precio final grupo familiar/ig,"").trim() : "";}
function tipoPrecioLabel(tipo){if(!tipo)return"Precio final grupo familiar";const t=String(tipo).toLowerCase();if(t.includes("persona"))return"Precio por persona";if(t.includes("total"))return"Precio total";return"Precio final grupo familiar";}
function textoWhatsApp(data, hotel){const numero=data.whatsapp?String(data.whatsapp).replace(/\D/g,""):"5493412177311";const msg=encodeURIComponent("Hola, quiero avanzar con esta opción de ETNIKA TRAVEL:\n\nAgente: "+(data.vendedora||"")+"\nCotización: "+(data.codigo||"")+"\nDestino: "+(data.destino||"")+"\nFecha: "+(data.fechaViaje||"")+"\nHotel: "+(hotel.nombre||"")+"\nPrecio: "+(hotel.precio||""));return `https://wa.me/${numero}?text=${msg}`;}
function renderIncluye(data){const items=data.incluyeItems&&data.incluyeItems.length?data.incluyeItems:["Aéreo incluido","Equipaje incluido","Traslados en destino","Alojamiento según opción elegida","Asesoramiento ETNIKA"];const icons=["✈️","🧳","🚐","🏨","💬","🛡️","🎟️","✅"];return `<section class="card"><h2 class="section-title">Tu viaje incluye</h2><div class="includes-grid">${items.map((item,i)=>`<div class="include-item"><span class="include-icon">${icons[i%icons.length]}</span><span>${item}</span></div>`).join("")}</div></section>`;}
function renderVuelos(data){const simple=data.simple||{};const tieneTexto=simple.detalleVuelos||simple.vueloIda||simple.vueloVuelta;const tieneCaptura=simple.capturaVuelo;const tienePrecio=simple.precioVuelo;if(!tieneTexto&&!tieneCaptura&&!tienePrecio)return"";return `<section class="card"><h2 class="section-title">Vuelos</h2>${tieneTexto?`<div class="flight-box"><div class="flight-title">Detalle de vuelos</div>${escapeLineas(simple.detalleVuelos||[simple.vueloIda,simple.vueloVuelta].filter(Boolean).join("\n\n"))}</div>`:""}${tieneCaptura?`<img src="${simple.capturaVuelo}" class="preview-img">`:""}${tienePrecio?`<div class="hotel-card" style="margin-top:16px;"><div class="hotel-price" style="text-align:center;"><div class="hotel-price-value">${simple.precioVuelo}</div><div class="hotel-price-note">${tipoPrecioLabel(simple.tipoPrecioVuelo)}</div></div></div>`:""}</section>`;}
function renderHoteles(data){const hoteles=data.hoteles||[];if(!hoteles.length)return"";return `<section class="card"><h2 class="section-title">Opciones de alojamiento</h2><div class="hotel-list">${hoteles.map(h=>`<div class="hotel-card"><div class="hotel-row"><div><div class="hotel-name">${h.nombre||"Hotel"}</div>${h.habitacion?`<div class="hotel-detail"><strong>Hab.</strong> ${h.habitacion}</div>`:""}${h.regimen?`<div class="hotel-detail"><strong>Régimen:</strong> ${h.regimen}</div>`:""}${h.categoria?`<div class="hotel-detail"><strong>Categoría:</strong> ${h.categoria}</div>`:""}${h.estado?`<div class="hotel-detail"><strong>Estado:</strong> ${h.estado}</div>`:""}</div><div class="hotel-price">${h.precio?`<div class="hotel-price-value">${limpiarPrecio(h.precio)}</div>`:""}<div class="hotel-price-note">${tipoPrecioLabel(h.tipoPrecio||data.tipoPrecio)}</div><div class="hotel-actions">${h.link?`<a class="btn btn-google" href="${h.link}" target="_blank">Ver hotel en Google</a>`:""}<a class="btn btn-option" href="${textoWhatsApp(data,h)}" target="_blank">Quiero esta opción</a></div></div></div></div>`).join("")}</div></section>`;}
function renderTramos(data){const tramos=data.tramos||[];if(!tramos.length)return"";return `<section class="card"><h2 class="section-title">Itinerario y servicios</h2><div class="hotel-list">${tramos.map(t=>`<div class="hotel-card"><div class="hotel-row"><div><div class="hotel-name">${t.tipo||""}: ${t.titulo||""}</div>${t.fechas?`<div class="hotel-detail"><strong>Fechas:</strong> ${t.fechas}</div>`:""}${t.duracion?`<div class="hotel-detail"><strong>Duración / noches:</strong> ${t.duracion}</div>`:""}${t.detalle?`<div class="hotel-detail">${escapeLineas(t.detalle)}</div>`:""}${t.regimen?`<div class="hotel-detail"><strong>Incluye / empresa:</strong> ${t.regimen}</div>`:""}${t.estado?`<div class="hotel-detail"><strong>Estado:</strong> ${t.estado}</div>`:""}${t.link?`<div class="hotel-detail"><a href="${t.link}" target="_blank">Ver link / ubicación</a></div>`:""}${t.imagen?`<img src="${t.imagen}" class="preview-img">`:""}</div><div class="hotel-price">${t.precio?`<div class="hotel-price-value">${limpiarPrecio(t.precio)}</div>`:""}</div></div></div>`).join("")}</div></section>`;}
function renderCotizacion(data){return `<section class="card"><h2 class="section-title">Datos de la cotización</h2><div class="data-grid">${data.cliente?`<div class="data-box"><div class="data-icon">👤</div><div><div class="data-label">Cliente</div><div class="data-value">${data.cliente}</div></div></div>`:""}${data.pasajeros?`<div class="data-box"><div class="data-icon">👥</div><div><div class="data-label">Pasajeros</div><div class="data-value">${data.pasajeros}</div></div></div>`:""}${data.fechaCotizacion?`<div class="data-box"><div class="data-icon">📅</div><div><div class="data-label">Fecha de cotización</div><div class="data-value">${data.fechaCotizacion}</div></div></div>`:""}${data.codigo?`<div class="data-box"><div class="data-icon">📄</div><div><div class="data-label">Cotización</div><div class="data-value">${data.codigo}</div></div></div>`:""}${data.vendedora?`<div class="data-box"><div class="data-icon">👩</div><div><div class="data-label">Agente</div><div class="data-value">${data.vendedora}</div></div></div>`:""}</div><div class="destination-box"><div class="destination-title">${data.destino||"Cotización de viaje"}</div>${data.fechaViaje?`<div class="destination-date">📅 ${data.fechaViaje}</div>`:""}</div></section>${renderIncluye(data)}${data.modo==="completo"?renderTramos(data):((data.tipoSimple||"paquete")!=="solo_hotel"?renderVuelos(data):"")}${data.modo==="simple"&&((data.tipoSimple||"paquete")!=="solo_vuelos")?renderHoteles(data):""}${data.formaPago?`<section class="card"><h2 class="section-title">Forma de pago</h2><div class="info-section">${escapeLineas(data.formaPago)}</div></section>`:""}${data.mostrarObservaciones&&data.observaciones?`<section class="card"><h2 class="section-title">Observaciones</h2><div class="info-section">${escapeLineas(data.observaciones)}</div></section>`:""}<section class="card footer"><h3>ETNIKA TRAVEL S.R.L.</h3><p>Legajo EVT Nº 18418 | CUIT 30-71775467-7</p><p><a href="https://maps.app.goo.gl/QGwE9kNAV4aiuszz9" target="_blank">📍 Ver oficina en Google Maps</a></p><p>🕒 Lunes a Viernes de 10:00 a 18:00 hs</p><p><a href="https://etnikatravel.tur.ar" target="_blank">🌐 etnikatravel.tur.ar</a> | <a href="https://instagram.com/etnikatravel" target="_blank">📸 @etnikatravel</a></p><p><a href="https://etnikatravel.tur.ar/general-conditions" target="_blank">Condiciones generales de contratación</a></p>${data.whatsapp?`<p><a class="btn btn-option" href="https://wa.me/${String(data.whatsapp).replace(/\D/g,"")}" target="_blank">📲 Contactar por WhatsApp</a></p>`:""}<div class="legal">Tarifas sujetas a disponibilidad y modificación sin previo aviso hasta el momento de la reserva y emisión.${data.validez?`<div class="validez">Validez de la cotización: ${data.validez}</div>`:""}</div></section>`;}
async function cargar(){const params=new URLSearchParams(window.location.search);const codigo=params.get("id");if(!codigo){document.getElementById("cotizacion").innerHTML='<div class="card"><h2 class="section-title">No se indicó una cotización.</h2></div>';return;}const {data,error}=await supabaseClient.from("cotizaciones").select("*").eq("codigo",codigo).single();if(error||!data){document.getElementById("cotizacion").innerHTML='<div class="card"><h2 class="section-title">No encontramos esta cotización.</h2></div>';console.error(error);return;}const datos=JSON.parse(data.datos_json);document.getElementById("cotizacion").innerHTML=renderCotizacion(datos);}
cargar();
</script>
</body>
</html>
