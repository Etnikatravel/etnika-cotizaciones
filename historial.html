<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNIKA TRAVEL | Historial de Cotizaciones</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --violeta:#7700E0;
  --violeta-oscuro:#4d0099;
  --turquesa:#00E5BF;
  --gris:#F2F2F2;
  --gris-suave:#f7f7fb;
  --oscuro:#171717;
  --texto:#2a2a2a;
  --borde:#e9e9ef;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:
    radial-gradient(circle at top left, rgba(0,229,191,.18), transparent 34%),
    radial-gradient(circle at top right, rgba(119,0,224,.18), transparent 30%),
    var(--gris-suave);
  color:var(--texto);
}

.header{
  background:white;
  text-align:center;
  padding:14px 20px 12px;
  box-shadow:0 4px 14px rgba(0,0,0,.04);
}

.logo{
  max-width:220px;
  width:100%;
  height:auto;
}

.container{
  max-width:1200px;
  margin:18px auto 30px;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,.94);
  border:1px solid rgba(255,255,255,.8);
  border-radius:24px;
  padding:28px;
  box-shadow:0 14px 38px rgba(32,18,54,.09);
  backdrop-filter:blur(8px);
}

h1{
  color:var(--violeta);
  margin-bottom:22px;
  font-size:34px;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:22px;
}

input{
  padding:14px;
  border:1px solid var(--borde);
  border-radius:14px;
  font-size:15px;
  min-width:280px;
  flex:1;
}

input:focus{
  outline:none;
  border-color:var(--violeta);
  box-shadow:0 0 0 4px rgba(119,0,224,.08);
}

.btn{
  border:none;
  padding:13px 18px;
  border-radius:999px;
  font-weight:800;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition:.2s;
  margin:2px;
}

.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(0,0,0,.12);
}

.btn-main{
  background:linear-gradient(135deg,var(--turquesa),var(--violeta));
  color:white;
}

.btn-secondary{
  background:#f0eef5;
  color:#312b3b;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0 10px;
  margin-top:12px;
}

th,td{
  padding:15px 12px;
  text-align:left;
  vertical-align:middle;
}

th{
  color:#555;
  background:#f7f6fb;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

tbody tr{
  background:white;
  box-shadow:0 6px 16px rgba(0,0,0,.05);
}

tbody td:first-child,
thead th:first-child{
  border-radius:14px 0 0 14px;
}

tbody td:last-child,
thead th:last-child{
  border-radius:0 14px 14px 0;
}

.codigo{
  font-weight:900;
  color:var(--violeta);
}

.empty{
  padding:22px;
  background:#fafafa;
  border-radius:16px;
  margin-top:15px;
}

@media(max-width:800px){
  table, thead, tbody, th, td, tr{display:block;}
  thead{display:none;}
  tr{background:#fafafa;margin-bottom:14px;border-radius:16px;padding:14px;box-shadow:0 6px 16px rgba(0,0,0,.05)}
  td{border:none;padding:8px 0;}
  td::before{font-weight:bold;color:#555;display:block;margin-bottom:3px}
  td:nth-child(1)::before{content:"Código";}
  td:nth-child(2)::before{content:"Cliente";}
  td:nth-child(3)::before{content:"Destino";}
  td:nth-child(4)::before{content:"Fecha viaje";}
  td:nth-child(5)::before{content:"Vendedora";}
  td:nth-child(6)::before{content:"Fecha cotización";}
  td:nth-child(7)::before{content:"Acciones";}
}
</style>
</head>

<body>

<header class="header">
  <img src="DEGRADADO CON LEGAJO.png" class="logo" alt="ETNIKA TRAVEL">
</header>

<div class="container">
  <section class="card">
    <h1>Historial de cotizaciones</h1>

    <div class="actions">
      <input id="buscador" placeholder="Buscar por cliente, destino, fecha de viaje, vendedora o código..." oninput="filtrar()">
      <a class="btn btn-main" href="admin.html">+ Nueva cotización</a>
      <button class="btn btn-secondary" onclick="cargarCotizaciones()">Actualizar</button>
    </div>

    <div id="resultado">
      Cargando cotizaciones...
    </div>
  </section>
</div>

<script>
const SUPABASE_URL = "https://izuvvwnqczvmphuvjzyf.supabase.co";
const SUPABASE_KEY = "sb_publishable_r8syG_LzXy7NUymta20UFA_kPjGw_HN";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let cotizaciones = [];

async function cargarCotizaciones(){
  const { data, error } = await supabaseClient
    .from("cotizaciones")
    .select("*")
    .order("id", { ascending:false });

  if(error){
    document.getElementById("resultado").innerHTML = '<div class="empty">No se pudieron cargar las cotizaciones.</div>';
    console.error(error);
    return;
  }

  cotizaciones = data || [];
  mostrar(cotizaciones);
}


function obtenerFechaViaje(c){
  if(c.fecha_viaje) return c.fecha_viaje;

  try{
    const datos = c.datos_json ? JSON.parse(c.datos_json) : null;
    return datos?.fechaViaje || "";
  }catch(e){
    return "";
  }
}

function mostrar(lista){
  if(!lista.length){
    document.getElementById("resultado").innerHTML = '<div class="empty">Todavía no hay cotizaciones guardadas.</div>';
    return;
  }

  let html = `
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Cliente</th>
          <th>Destino</th>
          <th>Fecha viaje</th>
          <th>Vendedora</th>
          <th>Fecha cotización</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
  `;

  lista.forEach(c=>{
    const link = window.location.origin + "/cotizacion.html?id=" + encodeURIComponent(c.codigo || "");
    const fechaViaje = obtenerFechaViaje(c);
    html += `
      <tr>
        <td class="codigo">${c.codigo || ""}</td>
        <td>${c.cliente || ""}</td>
        <td>${c.destino || ""}</td>
        <td>${fechaViaje}</td>
        <td>${c.vendedora || ""}</td>
        <td>${new Date(c.created_at).toLocaleDateString("es-AR")}</td>
        <td>
          <a class="btn btn-main" href="${link}" target="_blank">Ver</a>
          <a class="btn btn-secondary" href="admin.html?edit=${encodeURIComponent(c.codigo || "")}">Editar</a>
          <a class="btn btn-secondary" href="admin.html?duplicar=${encodeURIComponent(c.codigo || "")}">Duplicar</a>
          <button class="btn btn-secondary" onclick="copiar('${link}')">Copiar link</button>
        </td>
      </tr>
    `;
  });

  html += "</tbody></table>";
  document.getElementById("resultado").innerHTML = html;
}

function filtrar(){
  const q = document.getElementById("buscador").value.toLowerCase().trim();

  const filtradas = cotizaciones.filter(c =>
    String(c.codigo || "").toLowerCase().includes(q) ||
    String(c.cliente || "").toLowerCase().includes(q) ||
    String(c.destino || "").toLowerCase().includes(q) ||
    String(obtenerFechaViaje(c) || "").toLowerCase().includes(q) ||
    String(c.vendedora || "").toLowerCase().includes(q)
  );

  mostrar(filtradas);
}

function copiar(link){
  navigator.clipboard.writeText(link);
  alert("Link copiado");
}

cargarCotizaciones();
</script>

</body>
</html>
