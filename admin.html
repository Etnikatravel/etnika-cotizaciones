<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETNIKA TRAVEL | Admin Cotizaciones</title>
<style>
:root{--violeta:#7700E0;--turquesa:#00E5BF;--gris:#F2F2F2;--oscuro:#171717;--blanco:#fff;}
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;}
body{background:var(--gris);color:var(--oscuro);}
.header{background:white;text-align:center;padding:25px 20px;box-shadow:0 3px 12px rgba(0,0,0,.05);}
.logo{max-width:330px;width:100%;height:auto;}
.container{max-width:1200px;margin:30px auto;padding:0 20px;}
.card,.preview{background:white;border-radius:20px;padding:25px;margin-bottom:22px;box-shadow:0 6px 20px rgba(0,0,0,.08);}
h1,h2{color:var(--violeta);margin-bottom:18px;} h3{color:var(--violeta);margin-bottom:8px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;}
.campo{display:flex;flex-direction:column;} label{font-weight:bold;margin-bottom:6px;color:#555;}
input,textarea,select{padding:12px;border:1px solid #ddd;border-radius:12px;font-size:15px;background:white;} textarea{min-height:90px;}
.btn{border:none;padding:14px 22px;border-radius:30px;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block;text-align:center;font-size:15px;}
.btn-main{background:linear-gradient(135deg,var(--turquesa),var(--violeta));color:white;}.btn-secondary{background:#eee;color:#333;}.btn-whatsapp{background:var(--turquesa);color:#061b16;}
.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px;}.small{font-size:13px;color:#666;margin-top:8px;line-height:1.4;}
.tramo{border:1px solid #e5e5e5;border-radius:18px;padding:18px;margin-top:18px;background:#fafafa;}
.tramo-header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px;}.tramo-header strong{color:var(--violeta);}
.preview-logo{text-align:center;margin-bottom:25px;}.preview-logo img{max-width:300px;width:100%;height:auto;}
.preview-section{border-left:5px solid var(--turquesa);background:#fafafa;border-radius:14px;padding:18px;margin-bottom:16px;}
.preview-img{max-width:100%;border-radius:12px;margin-top:12px;border:1px solid #ddd;}
.footer-preview{text-align:center;border-left:none;background:white;border-top:1px solid #ddd;}
.link-output{background:#f7f7f7;border:1px dashed #bbb;padding:14px;border-radius:12px;margin-top:14px;word-break:break-all;}
@media(max-width:600px){.tramo-header{flex-direction:column;align-items:flex-start}.actions .btn{width:100%;}.logo{max-width:280px;}}
</style>
</head>
<body>
<header class="header"><img src="DEGRADADO CON LEGAJO.png" class="logo" alt="ETNIKA TRAVEL"></header>
<div class="container">
<section class="card">
<h1>Nueva cotización</h1>
<div class="grid">
<div class="campo"><label>Cliente</label><input id="cliente" placeholder="Ej: Familia Rodríguez"></div>
<div class="campo"><label>Destino / Viaje</label><input id="destino" placeholder="Ej: Europa 2026 / Punta Cana"></div>
<div class="campo"><label>Pasajeros</label><input id="pasajeros" placeholder="Ej: 2 adultos + 2 menores"></div>
<div class="campo"><label>Fecha de viaje</label><input id="fechaViaje" placeholder="Ej: 04/05 al 03/06"></div>
<div class="campo"><label>Fecha de cotización</label><input id="fechaCotizacion" placeholder="Ej: 12/06/2026"></div>
<div class="campo"><label>Vendedora / asesora</label><input id="vendedora" placeholder="Ej: Yamila / Carla"></div>
<div class="campo"><label>WhatsApp de contacto</label><input id="whatsapp" value="5493412177311"></div>
<div class="campo"><label>N° de cotización</label><input id="codigo" placeholder="Ej: ETK-2026-001"></div>
</div>
</section>
<section class="card">
<h2>Itinerario / servicios</h2>
<p class="small">Agregá todos los tramos necesarios: hoteles, vuelos, trenes, autos, traslados, excursiones u observaciones.</p>
<div class="actions">
<button class="btn btn-main" onclick="agregarTramo('Hotel')">+ Hotel</button>
<button class="btn btn-main" onclick="agregarTramo('Vuelo')">+ Vuelo</button>
<button class="btn btn-main" onclick="agregarTramo('Tren')">+ Tren</button>
<button class="btn btn-main" onclick="agregarTramo('Auto')">+ Auto</button>
<button class="btn btn-main" onclick="agregarTramo('Traslado')">+ Traslado</button>
<button class="btn btn-secondary" onclick="agregarTramo('Observación')">+ Observación</button>
</div>
<div id="tramos"></div>
</section>
<section class="card">
<h2>Forma de pago y condiciones</h2>
<div class="grid">
<div class="campo"><label>Forma de pago</label><textarea id="formaPago">50% al momento de la reserva. Saldo en entregas parciales hasta 30 días antes de viajar.</textarea></div>
<div class="campo"><label>Observaciones generales</label><textarea id="observaciones">Tarifas sujetas a disponibilidad y modificación sin previo aviso hasta el momento de la reserva y emisión.</textarea></div>
</div>
<div class="actions"><button class="btn btn-main" onclick="generarVista()">Generar vista previa</button><button class="btn btn-secondary" onclick="window.print()">Imprimir / guardar PDF</button></div>
</section>
<section class="preview" id="preview"><h2>Vista previa</h2><p>Completá los datos y tocá “Generar vista previa”.</p></section>
</div>
<script>
let contadorTramos=0;
function agregarTramo(tipoInicial='Hotel'){
 contadorTramos++;
 const contenedor=document.getElementById('tramos');
 const div=document.createElement('div');
 div.className='tramo'; div.id='tramo-'+contadorTramos;
 div.innerHTML=`
 <div class="tramo-header"><strong>Tramo ${contadorTramos}</strong><button class="btn btn-secondary" onclick="eliminarTramo(${contadorTramos})">Eliminar</button></div>
 <div class="grid">
 <div class="campo"><label>Tipo de tramo</label><select class="tipo">
 ${['Hotel','Vuelo','Tren','Auto','Traslado','Excursión','Observación'].map(t=>`<option ${t===tipoInicial?'selected':''}>${t}</option>`).join('')}
 </select></div>
 <div class="campo"><label>Título / Ciudad / Ruta</label><input class="titulo" placeholder="Ej: PARÍS / Vuelo Bari - Catania"></div>
 <div class="campo"><label>Fechas</label><input class="fechas" placeholder="Ej: 04/05 al 08/05"></div>
 <div class="campo"><label>Noches / duración</label><input class="duracion" placeholder="Ej: 4 noches / 1h15"></div>
 <div class="campo"><label>Detalle principal</label><textarea class="detalle" placeholder="Hotel, habitación, vuelo, tren, auto, etc."></textarea></div>
 <div class="campo"><label>Régimen / incluye</label><input class="regimen" placeholder="Ej: CON DESAYUNO / All Inclusive / Carry on"></div>
 <div class="campo"><label>Precio</label><input class="precio" placeholder="Ej: USD 290 por persona"></div>
 <div class="campo"><label>Link Google / proveedor</label><input class="link" placeholder="https://maps.app.goo.gl/..."></div>
 <div class="campo"><label>Estado</label><select class="estado"><option></option><option>Reservado</option><option>A elegir</option><option>Opcional</option><option>Incluido</option></select></div>
 <div class="campo"><label>Imagen / captura opcional</label><input type="file" class="imagen" accept="image/*"><span class="small">Capturas de vuelos, trenes o autos. Se ve en vista previa; para link público permanente luego conectamos base de datos.</span></div>
 </div>`;
 contenedor.appendChild(div);
}
function eliminarTramo(id){const t=document.getElementById('tramo-'+id); if(t)t.remove();}
function leerImagen(input){return new Promise(resolve=>{ if(!input.files||!input.files[0]){resolve('');return;} const r=new FileReader(); r.onload=e=>resolve(e.target.result); r.readAsDataURL(input.files[0]); });}
function nl(txt){return (txt||'').replace(/\n/g,'<br>');}
async function generarVista(){
 const cliente=document.getElementById('cliente').value; const destino=document.getElementById('destino').value; const pasajeros=document.getElementById('pasajeros').value; const fechaViaje=document.getElementById('fechaViaje').value; const fechaCotizacion=document.getElementById('fechaCotizacion').value; const vendedora=document.getElementById('vendedora').value; const whatsapp=document.getElementById('whatsapp').value; const codigo=document.getElementById('codigo').value; const formaPago=document.getElementById('formaPago').value; const observaciones=document.getElementById('observaciones').value;
 const tramos=document.querySelectorAll('.tramo'); let htmlTramos='';
 for(const tramo of tramos){
  const tipo=tramo.querySelector('.tipo').value; const titulo=tramo.querySelector('.titulo').value; const fechas=tramo.querySelector('.fechas').value; const duracion=tramo.querySelector('.duracion').value; const detalle=tramo.querySelector('.detalle').value; const regimen=tramo.querySelector('.regimen').value; const precio=tramo.querySelector('.precio').value; const link=tramo.querySelector('.link').value; const estado=tramo.querySelector('.estado').value; const imagen=await leerImagen(tramo.querySelector('.imagen'));
  htmlTramos+=`<div class="preview-section"><h3>${tipo}${titulo?': '+titulo:''}</h3>${fechas?`<p><strong>Fechas:</strong> ${fechas}</p>`:''}${duracion?`<p><strong>Duración / noches:</strong> ${duracion}</p>`:''}${detalle?`<p><strong>Detalle:</strong><br>${nl(detalle)}</p>`:''}${regimen?`<p><strong>Régimen / incluye:</strong> ${regimen}</p>`:''}${precio?`<p><strong>Precio:</strong> ${precio}</p>`:''}${estado?`<p><strong>Estado:</strong> ${estado}</p>`:''}${link?`<p><a href="${link}" target="_blank">Ver link / ubicación</a></p>`:''}${imagen?`<img src="${imagen}" class="preview-img">`:''}</div>`;
 }
 document.getElementById('preview').innerHTML=`<div class="preview-logo"><img src="DEGRADADO CON LEGAJO.png" alt="ETNIKA TRAVEL"></div><h2>${destino||'Cotización de viaje'}</h2><div class="preview-section">${cliente?`<p><strong>Cliente:</strong> ${cliente}</p>`:''}${pasajeros?`<p><strong>Pasajeros:</strong> ${pasajeros}</p>`:''}${fechaViaje?`<p><strong>Fecha de viaje:</strong> ${fechaViaje}</p>`:''}${fechaCotizacion?`<p><strong>Fecha de cotización:</strong> ${fechaCotizacion}</p>`:''}${codigo?`<p><strong>Cotización:</strong> ${codigo}</p>`:''}${vendedora?`<p><strong>Asesora:</strong> ${vendedora}</p>`:''}</div><h2>Itinerario y servicios</h2>${htmlTramos||'<p>No se agregaron tramos.</p>'}<div class="preview-section"><h3>Forma de pago</h3><p>${nl(formaPago)}</p></div><div class="preview-section"><h3>Condiciones importantes</h3><p>${nl(observaciones)}</p><p>La contratación implica la aceptación de las <a href="https://etnikatravel.tur.ar/general-conditions" target="_blank">Condiciones Generales de ETNIKA TRAVEL</a>.</p></div><div class="preview-section footer-preview"><h3>ETNIKA TRAVEL S.R.L.</h3><p>Legajo EVT Nº 18418 | CUIT 30-71775467-7</p><p><a href="https://maps.app.goo.gl/QGwE9kNAV4aiuszz9" target="_blank">📍 Ver oficina en Google Maps</a></p><p>🕒 Lunes a Viernes de 10:00 a 18:00 hs</p><p><a href="https://etnikatravel.tur.ar" target="_blank">🌐 etnikatravel.tur.ar</a></p>${whatsapp?`<p style="margin-top:15px;"><a class="btn btn-whatsapp" href="https://wa.me/${whatsapp}" target="_blank">📲 Contactar por WhatsApp</a></p>`:''}</div><div class="link-output"><strong>Próximo paso:</strong> cuando conectemos Supabase, acá aparecerá el link único para enviar al cliente.</div>`;
}
</script>
</body>
</html>
