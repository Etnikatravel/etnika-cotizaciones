<title>ETNIKA TRAVEL | Panel de Cotizaciones</title>

<style>

:root{
  --violeta:#7700E0;
  --turquesa:#00E5BF;
  --gris:#F2F2F2;
  --oscuro:#171717;
  --blanco:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#f4f4f4;
}

.header{
  background:white;
  padding:30px;
  text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.logo{
  max-width:350px;
}

.container{
  max-width:1200px;
  margin:30px auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
  color:var(--violeta);
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}

.campo{
  display:flex;
  flex-direction:column;
}

label{
  margin-bottom:6px;
  font-weight:bold;
  color:#555;
}

input,
textarea,
select{
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:15px;
}

textarea{
  min-height:120px;
}

.btn{
  margin-top:25px;
  width:100%;
  border:none;
  padding:16px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--turquesa),var(--violeta));
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.btn:hover{
  opacity:.9;
}

.preview{
  margin-top:30px;
  background:#fafafa;
  border:2px dashed #ccc;
  border-radius:20px;
  padding:20px;
}

.preview h2{
  color:var(--violeta);
  margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">

<img
src="DEGRADADO CON LEGAJO.png"
class="logo"
alt="ETNIKA TRAVEL">

</div>

<div class="container">

<div class="card">

<h1>Nueva Cotización</h1>

<div class="grid">

<div class="campo">
<label>Cliente</label>
<input id="cliente">
</div>

<div class="campo">
<label>Destino</label>
<input id="destino">
</div>

<div class="campo">
<label>Fecha de viaje</label>
<input id="fechaviaje">
</div>

<div class="campo">
<label>Fecha de cotización</label>
<input id="fechacotizacion">
</div>

<div class="campo">
<label>Vendedora</label>
<input id="vendedora">
</div>

<div class="campo">
<label>Hotel</label>
<input id="hotel">
</div>

<div class="campo">
<label>Categoría habitación</label>
<input id="habitacion">
</div>

<div class="campo">
<label>Precio final</label>
<input id="precio">
</div>

<div class="campo">
<label>Link Google Maps / Hotel</label>
<input id="linkhotel">
</div>

<div class="campo">
<label>Forma de pago</label>
<textarea id="pago"></textarea>
</div>

<div class="campo">
<label>Observaciones</label>
<textarea id="obs"></textarea>
</div>

</div>

<button class="btn" onclick="generar()">
Generar Vista Previa
</button>

<div class="preview" id="preview">

<h2>Vista previa</h2>

<p>
Completá los datos y presioná el botón.
</p>

</div>

</div>

</div>

<script>

function generar(){

let cliente=document.getElementById("cliente").value;
let destino=document.getElementById("destino").value;
let fechaviaje=document.getElementById("fechaviaje").value;
let fechacotizacion=document.getElementById("fechacotizacion").value;
let vendedora=document.getElementById("vendedora").value;
let hotel=document.getElementById("hotel").value;
let habitacion=document.getElementById("habitacion").value;
let precio=document.getElementById("precio").value;
let linkhotel=document.getElementById("linkhotel").value;
let pago=document.getElementById("pago").value;
let obs=document.getElementById("obs").value;

document.getElementById("preview").innerHTML=`

<h2>${destino}</h2>

<p><strong>Cliente:</strong> ${cliente}</p>

<p><strong>Fecha de viaje:</strong> ${fechaviaje}</p>

<p><strong>Fecha de cotización:</strong> ${fechacotizacion}</p>

<p><strong>Hotel:</strong> ${hotel}</p>

<p><strong>Habitación:</strong> ${habitacion}</p>

<p><strong>Precio:</strong> ${precio}</p>

<p>
<a href="${linkhotel}" target="_blank">
Ver hotel
</a>
</p>

<p><strong>Forma de pago:</strong><br>${pago}</p>

<p><strong>Observaciones:</strong><br>${obs}</p>

<p><strong>Asesora:</strong> ${vendedora}</p>

`;

}

</script>

</body>
